    grid.appendChild(card);
  });
}

function buildTrackSelect() {
  const grid = document.getElementById('track-grid');
  grid.innerHTML = '';

  TRACK_CONFIGS.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'track-card' + (i === selectedTrack ? ' selected' : '');
    card.onclick = () => {
      selectedTrack = i;
      document.querySelectorAll('.track-card').forEach(tc => tc.classList.remove('selected'));
      card.classList.add('selected');
      playSound(440, 0.1, 'sine', 0.2);
    };

    // Mini track preview
    const previewCanvas = document.createElement('canvas');
    previewCanvas.width = 220;
    previewCanvas.height = 150;

    // Draw mini track using CatmullRom spline for accuracy
    const ctx = previewCanvas.getContext('2d');
    const pts3d = t.points.map(p => new THREE.Vector3(p[0], p[1], p[2]));
    const previewCurve = new THREE.CatmullRomCurve3(pts3d, true, 'catmullrom', 0.5);
    const splinePts = [];
    const splineSamples = 200;
    for (let si = 0; si < splineSamples; si++) {
      const sp = previewCurve.getPointAt(si / splineSamples);
      splinePts.push([sp.x, sp.z]);
    }
    let mnX = Infinity, mxX = -Infinity, mnZ = Infinity, mxZ = -Infinity;
    splinePts.forEach(p => { mnX = Math.min(mnX, p[0]); mxX = Math.max(mxX, p[0]); mnZ = Math.min(mnZ, p[1]); mxZ = Math.max(mxZ, p[1]); });
    const pad = 25;
    const sX = (220 - pad * 2) / (mxX - mnX || 1);
    const sZ = (150 - pad * 2) / (mxZ - mnZ || 1);
    const s = Math.min(sX, sZ);

    ctx.strokeStyle = t.color;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    splinePts.forEach((p, pi) => {
      const x = (p[0] - mnX) * s + (220 - (mxX - mnX) * s) / 2;
      const y = (p[1] - mnZ) * s + (150 - (mxZ - mnZ) * s) / 2;
      if (pi === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.stroke();

    // Start indicator
    const startPt = previewCurve.getPointAt(0);
    const sx = (startPt.x - mnX) * s + (220 - (mxX - mnX) * s) / 2;
    const sy = (startPt.z - mnZ) * s + (150 - (mxZ - mnZ) * s) / 2;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx, sy, 5, 0, Math.PI * 2);
    ctx.fill();

    const previewDiv = document.createElement('div');
    previewDiv.className = 'track-preview';
    previewDiv.appendChild(previewCanvas);

    card.innerHTML = '';
    card.appendChild(previewDiv);

    const nameEl = document.createElement('div');
    nameEl.className = 'track-name';
    nameEl.style.color = t.color;
    nameEl.textContent = t.name;
    card.appendChild(nameEl);

    const descEl = document.createElement('div');
    descEl.className = 'track-desc';
    descEl.textContent = t.desc;
    card.appendChild(descEl);

    grid.appendChild(card);
  });
}

function startRace() {
  if (!audioCtx) initAudio();
  gameState = 'countdown';

  // Hide screens, show HUD
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('results-screen').classList.add('hidden');

  // Setup scene
  setupScene(selectedTrack);

  // Show touch controls on mobile
  if (isMobile) {
    document.getElementById('touch-controls').classList.remove('hidden');
  }

  // Create karts
  karts = [];
  const charOrder = [selectedChar];
  const available = [];
  for (let i = 0; i < CHARACTERS.length; i++) {
    if (i !== selectedChar) available.push(i);
  }
  // Shuffle
  for (let i = available.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [available[i], available[j]] = [available[j], available[i]];
  }
  for (let i = 0; i < TOTAL_RACERS - 1; i++) {
    charOrder.push(available[i % available.length]);
  }

  // Place karts on grid
  const startPos = trackPoints[0].clone();
  const startTan = trackTangents[0];
  const startRight = new THREE.Vector3().crossVectors(startTan, new THREE.Vector3(0, 1, 0)).normalize();
  const startForward = new THREE.Vector3(-startTan.x, 0, -startTan.z);

  for (let i = 0; i < TOTAL_RACERS; i++) {
    const kart = createKart(charOrder[i], i === 0);

    const row = Math.floor(i / 2);
    const col = (i % 2) * 2 - 1;

    kart.position.copy(startPos);
    kart.position.addScaledVector(startForward, row * 4 + 2);
    kart.position.addScaledVector(startRight, col * 2);
    kart.position.y = startPos.y;

    kart.rotation = Math.atan2(-startTan.x, -startTan.z);
    kart.mesh.position.copy(kart.position);
    kart.mesh.rotation.y = kart.rotation;

    karts.push(kart);
    if (i === 0) playerKart = kart;
  }

  // Camera initial position
  camera.position.copy(playerKart.position);
  camera.position.y += 5;
  camera.position.addScaledVector(startForward, -8);

  // Countdown
  raceTime = 0;
  countdownTimer = 4;
  doCountdown();
}

function doCountdown() {
  const el = document.getElementById('countdown');
  el.classList.remove('hidden');

  const interval = setInterval(() => {
    countdownTimer -= 1;

    if (countdownTimer > 0) {
      el.textContent = countdownTimer;
      el.style.color = '#fff';
      el.style.animation = 'countPulse 0.5s ease';
      setTimeout(() => el.style.animation = '', 500);
      playCountdownBeep(false);
    } else if (countdownTimer === 0) {
      el.textContent = 'GO!';
      el.style.color = '#4dff4d';
      playCountdownBeep(true);
      gameState = 'racing';
      startBGM();
      setTimeout(() => {
        el.classList.add('hidden');
      }, 1000);
      clearInterval(interval);
    }
  }, 1000);

  el.textContent = '3';
  playCountdownBeep(false);
}

function showRaceMessage(text) {
  const el = document.getElementById('race-msg');
  el.textContent = text;
  el.style.opacity = '1';
  el.classList.remove('hidden');
  setTimeout(() => {
    el.style.opacity = '0';
    setTimeout(() => el.classList.add('hidden'), 500);
  }, 2000);
}

function showResults() {
  gameState = 'results';
  stopBGM();
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('touch-controls').classList.add('hidden');
  document.getElementById('results-screen').classList.remove('hidden');

  // Sort karts by finish time / progress
  const sorted = [...karts].sort((a, b) => {
    if (a.finished && b.finished) return a.finishTime - b.finishTime;
    if (a.finished) return -1;
    if (b.finished) return 1;
    return (b.lap + b.trackProgress) - (a.lap + a.trackProgress);
  });

  // Find player position
  const playerPos = sorted.findIndex(k => k.isPlayer) + 1;

  const table = document.getElementById('results-table');
  table.innerHTML = '';

  // Header
  const headerRow = document.createElement('tr');
  const headerMsg = playerPos === 1 ? 'YOU WIN!' : playerPos <= 3 ? 'GREAT RACE!' : 'RACE COMPLETE';
  const headerColor = playerPos === 1 ? '#ffd93d' : playerPos <= 3 ? '#6bcb77' : '#aaa';
  headerRow.innerHTML = `<td colspan="3" style="text-align:center;font-size:1.5em;font-weight:900;color:${headerColor};padding:15px 0">${headerMsg}</td>`;
  table.appendChild(headerRow);

  sorted.forEach((k, i) => {
    const row = document.createElement('tr');
    if (k.isPlayer) row.className = 'player-row';

    const time = k.finished ? formatTime(k.finishTime) : 'DNF';
    const color = '#' + k.charConfig.color.toString(16).padStart(6, '0');
    const medal = i === 0 ? ' &#x1F947;' : i === 1 ? ' &#x1F948;' : i === 2 ? ' &#x1F949;' : '';

    row.innerHTML = `
      <td class="pos">${i + 1}${getPositionSuffix(i + 1)}</td>
      <td style="color:${color};font-weight:700">${k.charConfig.name}${k.isPlayer ? ' (YOU)' : ''}${medal}</td>
      <td class="time">${time}</td>
    `;
    table.appendChild(row);
  });

  // Victory sound
  if (playerPos === 1) {
    [523,659,784,1047].forEach((f,i) => setTimeout(() => playSound(f, 0.3, 'sine', 0.4), i*150));
  } else if (playerPos <= 3) {
    [440,523,659].forEach((f,i) => setTimeout(() => playSound(f, 0.2, 'sine', 0.3), i*200));
  }
}

function formatTime(t) {
  const min = Math.floor(t / 60);
  const sec = Math.floor(t % 60);
  const ms = Math.floor((t % 1) * 1000);
  return `${min}:${sec.toString().padStart(2, '0')}.${ms.toString().padStart(3, '0')}`;
}

// ==================== COLLISIONS ====================
function checkItemBoxCollisions() {
  karts.forEach(k => {
    if (k.item) return; // Already has item

    itemBoxes.forEach(box => {
      if (!box.userData.active) return;
      if (box.position.distanceTo(k.position) < 2.5) {
        box.userData.active = false;
        box.userData.respawnTimer = 3;
        box.visible = false;

        const position = getKartPosition(k);
        k.item = getRandomItem(position);

        if (k.isPlayer) {
          playItemPickup();
          updateItemDisplay();
        }
      }
    });
  });
}

function checkKartCollisions() {
  for (let i = 0; i < karts.length; i++) {
    for (let j = i + 1; j < karts.length; j++) {
      const a = karts[i], b = karts[j];
      const dist = a.position.distanceTo(b.position);

      if (dist < 2.2 && dist > 0.01) {
        // Push apart
        const push = new THREE.Vector3().subVectors(a.position, b.position).normalize();
        const overlap = 2.2 - dist;
        a.position.addScaledVector(push, overlap * 0.5);
        b.position.addScaledVector(push, -overlap * 0.5);

        // Speed exchange
        const avgSpeed = (a.speed + b.speed) * 0.5;
        a.speed = avgSpeed * 0.9;
        b.speed = avgSpeed * 0.9;
      }
    }
  }
}

// ==================== MAIN LOOP ====================
let engineSoundTimer = 0;

function gameLoop() {
  requestAnimationFrame(gameLoop);

  const dt = Math.min(clock.getDelta(), 0.05);

  if (gameState === 'racing') {
    raceTime += dt;

    // Player input - CTR style: Shift=boost during drift, item when not drifting
    const shiftDown = keys['shift'] || keys['e'];
    const playerInput = {
      accelerate: keys['w'] || keys['arrowup'],
      brake: keys['s'] || keys['arrowdown'],
      steer: (keys['a'] || keys['arrowleft'] ? 1 : 0) - (keys['d'] || keys['arrowright'] ? 1 : 0),
      drift: keys[' '],
      useItem: shiftDown  // during drift this triggers boost, handled in physics
    };

    // Update player
    if (playerKart && !playerKart.finished) {
      updateKartPhysics(playerKart, dt, playerInput);

      // Use item only when NOT drifting
      if (shiftDown && !playerKart.isDrifting && playerKart.item && !playerKart._itemUsedThisPress) {
        useItem(playerKart);
        playerKart._itemUsedThisPress = true;
      }
      if (!shiftDown) playerKart._itemUsedThisPress = false;
    } else if (playerKart && playerKart.finished) {
      playerKart.speed *= 0.98;
      playerKart.mesh.position.copy(playerKart.position);
    }

    // Update AI
    karts.forEach(k => {
      if (!k.isPlayer) updateAI(k, dt);
    });

    // Items
    updateProjectiles(dt);
    checkItemBoxCollisions();
    checkKartCollisions();

    // Update item boxes
    itemBoxes.forEach(box => {
      if (box.userData.active) {
        box.rotation.y += 1.5 * dt;
        box.position.y = box.userData.baseY + Math.sin(Date.now() * 0.003) * 0.3;
      } else {
        box.userData.respawnTimer -= dt;
        if (box.userData.respawnTimer <= 0) {
          box.userData.active = true;
          box.visible = true;
        }
      }
    });

    // Particles
    updateParticles(dt);

    // Engine sound
    engineSoundTimer += dt;
    if (engineSoundTimer > 0.1 && playerKart) {
      playEngineSound(Math.abs(playerKart.speed), playerKart.maxSpeed);
      engineSoundTimer = 0;
    }

    // Drift sound
    if (playerKart && playerKart.isDrifting && Math.random() < 0.1) {
      playDriftSound();
    }

    // HUD
    updateHUD();

    // Check race end
    if (playerKart && playerKart.finished && gameState === 'racing') {
      showRaceMessage('FINISH!');
      gameState = 'finished';
      setTimeout(() => showResults(), 3000);
    }
  }

  // Camera always updates during racing/countdown/finished
  if (gameState === 'racing' || gameState === 'countdown' || gameState === 'finished') {
    updateCamera(dt);
  }

  // Animate water
  if (waterMesh) waterMesh.position.y = -0.6 + Math.sin(Date.now() * 0.001) * 0.15;

  composer.render();
}

// ==================== INPUT ====================
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ') e.preventDefault();
});

document.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

// ==================== TOUCH INPUT ====================
let isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
let touchKeys = {};

function setupTouchControls() {
  if (!isMobile) return;
  document.getElementById('touch-controls').classList.remove('hidden');

  const bindings = [
    ['t-up', 'w'], ['t-down', 's'], ['t-left', 'a'], ['t-right', 'd'],
    ['t-drift', ' '], ['t-item', 'shift']
  ];

  bindings.forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (!el) return;

    el.addEventListener('touchstart', e => {
      e.preventDefault();
      touchKeys[key] = true;
      keys[key] = true;
      el.classList.add('active');
    }, { passive: false });

    el.addEventListener('touchend', e => {
      e.preventDefault();
      touchKeys[key] = false;
      keys[key] = false;
      el.classList.remove('active');
    }, { passive: false });

    el.addEventListener('touchcancel', e => {
      touchKeys[key] = false;
      keys[key] = false;
      el.classList.remove('active');
    });
  });
}

// ==================== BGM ====================
let bgmOscillators = [];
let bgmPlaying = false;

function startBGM() {
  if (!audioCtx || bgmPlaying) return;
  bgmPlaying = true;

  // Simple energetic melody using oscillators
  const melodyNotes = [
    262, 330, 392, 523, 392, 330, 262, 330,
    294, 370, 440, 587, 440, 370, 294, 370,
    330, 415, 494, 659, 494, 415, 330, 415,
    349, 440, 523, 698, 523, 440, 349, 440
  ];
  const bassNotes = [
    131, 131, 131, 131, 147, 147, 147, 147,
    165, 165, 165, 165, 175, 175, 175, 175
  ];

  let noteIdx = 0;
  let bassIdx = 0;
  const bpm = 160;
  const noteLen = 60 / bpm;

  function playBGMNote() {
    if (!bgmPlaying || gameState === 'results' || gameState === 'title') {
      bgmPlaying = false;
      return;
    }

    // Melody
    const mFreq = melodyNotes[noteIdx % melodyNotes.length];
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(mFreq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + noteLen * 0.8);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + noteLen * 0.9);

    // Bass (every 2 notes)
    if (noteIdx % 2 === 0) {
      const bFreq = bassNotes[bassIdx % bassNotes.length];
      const bOsc = audioCtx.createOscillator();
      const bGain = audioCtx.createGain();
      bOsc.type = 'triangle';
      bOsc.frequency.setValueAtTime(bFreq, audioCtx.currentTime);
      bGain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      bGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + noteLen * 1.8);
      bOsc.connect(bGain);
      bGain.connect(masterGain);
      bOsc.start();
      bOsc.stop(audioCtx.currentTime + noteLen * 1.9);
      bassIdx++;
    }

    noteIdx++;
    setTimeout(playBGMNote, noteLen * 1000);
  }

  playBGMNote();
}

function stopBGM() {
  bgmPlaying = false;
}

// ==================== INIT ====================
function init() {
  initThree();
  setupTouchControls();
  showScreen('title-screen');

  // Start render loop
  gameLoop();
}

// Start!
init();
