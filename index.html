// ==================== TRACK GENERATION ====================
function buildTrack(trackIdx) {
  const config = TRACK_CONFIGS[trackIdx];
  const pts = config.points.map(p => new THREE.Vector3(p[0], p[1], p[2]));

  trackCurve = new THREE.CatmullRomCurve3(pts, true, 'catmullrom', 0.5);

  // Sample track
  trackPoints = [];
  trackTangents = [];
  for (let i = 0; i < TRACK_SAMPLES; i++) {
    const t = i / TRACK_SAMPLES;
    trackPoints.push(trackCurve.getPointAt(t));
    trackTangents.push(trackCurve.getTangentAt(t).normalize());
  }

  // Generate road geometry
  const roadVerts = [];
  const roadNorms = [];
  const roadUvs = [];
  const roadIdx = [];
  const curbVerts = [];
  const curbNorms = [];
  const curbIdx = [];

  const up = new THREE.Vector3(0, 1, 0);

  for (let i = 0; i <= TRACK_SAMPLES; i++) {
    const idx = i % TRACK_SAMPLES;
    const p = trackPoints[idx];
    const t = trackTangents[idx];
    const right = new THREE.Vector3().crossVectors(t, up).normalize();

    const hw = ROAD_WIDTH / 2;
    const lx = p.x - right.x * hw, ly = p.y + 0.01, lz = p.z - right.z * hw;
    const rx = p.x + right.x * hw, ry = p.y + 0.01, rz = p.z + right.z * hw;

    roadVerts.push(lx, ly, lz, rx, ry, rz);
    roadNorms.push(0, 1, 0, 0, 1, 0);
    roadUvs.push(0, i / TRACK_SAMPLES * 20, 1, i / TRACK_SAMPLES * 20);

    // Curb - left (compact racing-style kerb)
    const clx = lx - right.x * 1.0, clz = lz - right.z * 1.0;
    curbVerts.push(lx, ly + 0.02, lz, clx, ly + 0.18, clz);
    curbNorms.push(0, 1, 0, 0, 1, 0);

    // Curb - right
    const crx = rx + right.x * 1.0, crz = rz + right.z * 1.0;
    curbVerts.push(rx, ry + 0.02, rz, crx, ry + 0.18, crz);
    curbNorms.push(0, 1, 0, 0, 1, 0);

    if (i < TRACK_SAMPLES) {
      const base = i * 2;
      roadIdx.push(base, base + 2, base + 1, base + 1, base + 2, base + 3);

      const cBase = i * 4;
      curbIdx.push(cBase, cBase + 4, cBase + 1, cBase + 1, cBase + 4, cBase + 5);
      curbIdx.push(cBase + 2, cBase + 6, cBase + 3, cBase + 3, cBase + 6, cBase + 7);
    }
  }

  // Road mesh
  const roadGeom = new THREE.BufferGeometry();
  roadGeom.setAttribute('position', new THREE.Float32BufferAttribute(roadVerts, 3));
  roadGeom.setAttribute('normal', new THREE.Float32BufferAttribute(roadNorms, 3));
  roadGeom.setAttribute('uv', new THREE.Float32BufferAttribute(roadUvs, 2));
  roadGeom.setIndex(roadIdx);

  const isNight = trackIdx === 1;
  const roadMat = new THREE.MeshStandardMaterial({
    color: isNight ? 0x2a2a3e : 0x3a3a42,
    roughness: isNight ? 0.3 : 0.75,
    metalness: isNight ? 0.05 : 0.0
  });
  const road = new THREE.Mesh(roadGeom, roadMat);
  road.receiveShadow = true;
  scene.add(road);

  // Road edge white lines (both sides)
  const edgeLineVerts = [];
  const edgeLineIdx = [];
  for (let i = 0; i <= TRACK_SAMPLES; i++) {
    const idx = i % TRACK_SAMPLES;
    const p = trackPoints[idx];
    const t2 = trackTangents[idx];
    const right = new THREE.Vector3().crossVectors(t2, up).normalize();
    const hw = ROAD_WIDTH / 2;
    const lw = 1.0; // line width - thick white edge lines
    // Left edge line
    edgeLineVerts.push(
      p.x - right.x * (hw - lw), p.y + 0.025, p.z - right.z * (hw - lw),
      p.x - right.x * hw, p.y + 0.025, p.z - right.z * hw
    );
    // Right edge line
    edgeLineVerts.push(
      p.x + right.x * hw, p.y + 0.025, p.z + right.z * hw,
      p.x + right.x * (hw - lw), p.y + 0.025, p.z + right.z * (hw - lw)
    );
    if (i < TRACK_SAMPLES) {
      const b = i * 4;
      edgeLineIdx.push(b, b+4, b+1, b+1, b+4, b+5); // left
      edgeLineIdx.push(b+2, b+6, b+3, b+3, b+6, b+7); // right
    }
  }
  const edgeGeom = new THREE.BufferGeometry();
  edgeGeom.setAttribute('position', new THREE.Float32BufferAttribute(edgeLineVerts, 3));
  edgeGeom.setIndex(edgeLineIdx);
  edgeGeom.computeVertexNormals();
  const edgeMat = isNight
    ? new THREE.MeshStandardMaterial({ color: 0x66ddff, emissive: 0x66ddff, emissiveIntensity: 0.5, roughness: 0.3, metalness: 0.0 })
    : new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5, metalness: 0.0 });
  scene.add(new THREE.Mesh(edgeGeom, edgeMat));

  // Red-white striped curbs
  const curbGeomR = new THREE.BufferGeometry();
  curbGeomR.setAttribute('position', new THREE.Float32BufferAttribute(curbVerts, 3));
  curbGeomR.setAttribute('normal', new THREE.Float32BufferAttribute(curbNorms, 3));
  curbGeomR.setIndex(curbIdx);

  // Use vertex colors for red-white stripe pattern
  const curbColors = new Float32Array(curbVerts.length);
  for (let i = 0; i <= TRACK_SAMPLES; i++) {
    const isRed = Math.floor(i / 4) % 2 === 0;
    const r = isRed ? 0.85 : 1.0;
    const g = isRed ? 0.15 : 1.0;
    const b = isRed ? 0.15 : 1.0;
    const ci = i * 4 * 3; // 4 vertices per sample, 3 components each
    for (let v = 0; v < 4; v++) {
      if (ci + v * 3 + 2 < curbColors.length) {
        curbColors[ci + v * 3] = r;
        curbColors[ci + v * 3 + 1] = g;
        curbColors[ci + v * 3 + 2] = b;
      }
    }
  }
  curbGeomR.setAttribute('color', new THREE.Float32BufferAttribute(curbColors, 3));
  const curbMat = new THREE.MeshLambertMaterial({ vertexColors: true, side: THREE.DoubleSide });
  scene.add(new THREE.Mesh(curbGeomR, curbMat));

  // Guardrail posts
  const postGeom = new THREE.BoxGeometry(0.35, 1.5, 0.35);
  const postMat = new THREE.MeshLambertMaterial({ color: 0xeeeeee });
  const railGeom = new THREE.BoxGeometry(0.15, 0.2, 1);
  for (let i = 0; i < TRACK_SAMPLES; i += 10) {
    const p = trackPoints[i];
    const t2 = trackTangents[i];
    const right = new THREE.Vector3().crossVectors(t2, up).normalize();
    for (let side = -1; side <= 1; side += 2) {
      const dist = ROAD_WIDTH / 2 + 1.5;
      const post = new THREE.Mesh(postGeom, postMat);
      post.position.set(
        p.x + right.x * side * dist,
        p.y + 0.75,
        p.z + right.z * side * dist
      );
      scene.add(post);
    }
  }

  // Start/finish line + gate arch
  const sfPos = trackPoints[0];
  const sfTan = trackTangents[0];
  const sfRight = new THREE.Vector3().crossVectors(sfTan, up).normalize();
  // Checkered start line
  const sfGeom = new THREE.PlaneGeometry(ROAD_WIDTH, 4);
  const sfMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const sf = new THREE.Mesh(sfGeom, sfMat);
  sf.position.set(sfPos.x, sfPos.y + 0.05, sfPos.z);
  sf.rotation.x = -Math.PI / 2;
  sf.rotation.z = -Math.atan2(sfTan.x, sfTan.z);
  scene.add(sf);
  // Black stripes on start line
  for (let s = 0; s < 4; s++) {
    const stripeG = new THREE.PlaneGeometry(ROAD_WIDTH / 4, 2);
    const stripeM = new THREE.MeshLambertMaterial({ color: 0x111111 });
    const stripe = new THREE.Mesh(stripeG, stripeM);
    const offset = (s - 1.5) * (ROAD_WIDTH / 4);
    stripe.position.set(
      sfPos.x + sfRight.x * offset + (s % 2 === 0 ? sfTan.x * 1 : 0),
      sfPos.y + 0.06,
      sfPos.z + sfRight.z * offset + (s % 2 === 0 ? sfTan.z * 1 : 0)
    );
    stripe.rotation.x = -Math.PI / 2;
    stripe.rotation.z = -Math.atan2(sfTan.x, sfTan.z);
    scene.add(stripe);
  }
  // Start gate arch
  const archMat = new THREE.MeshStandardMaterial({ color: 0xee2222, roughness: 0.4, metalness: 0.6 });
  const pillarGeom = new THREE.BoxGeometry(0.8, 6, 0.8);
  for (let side = -1; side <= 1; side += 2) {
    const pillar = new THREE.Mesh(pillarGeom, archMat);
    pillar.position.set(
      sfPos.x + sfRight.x * side * (ROAD_WIDTH / 2 + 1.5),
      sfPos.y + 3,
      sfPos.z + sfRight.z * side * (ROAD_WIDTH / 2 + 1.5)
    );
    pillar.castShadow = true;
    scene.add(pillar);
  }
  const beamGeom = new THREE.BoxGeometry(ROAD_WIDTH + 4, 0.8, 1.2);
  const beam = new THREE.Mesh(beamGeom, archMat);
  beam.position.set(sfPos.x, sfPos.y + 6, sfPos.z);
  beam.rotation.y = Math.atan2(sfRight.x, sfRight.z);
  scene.add(beam);

  // Yellow dashed center line
  for (let i = 0; i < TRACK_SAMPLES; i += 5) {
    if (i % 10 >= 5) continue;
    const p1 = trackPoints[i];
    const p2 = trackPoints[(i + 2) % TRACK_SAMPLES];
    const dashGeom = new THREE.PlaneGeometry(0.9, 3.0);
    const dashMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0xffcc00, emissiveIntensity: 0.15, roughness: 0.5, metalness: 0.0 });
    const dash = new THREE.Mesh(dashGeom, dashMat);
    const mx = (p1.x + p2.x) / 2, mz = (p1.z + p2.z) / 2, my = (p1.y + p2.y) / 2;
    dash.position.set(mx, my + 0.03, mz);
    dash.rotation.x = -Math.PI / 2;
    const tan = trackTangents[i];
    dash.rotation.z = -Math.atan2(tan.x, tan.z);
    scene.add(dash);
  }

  // Corner arrow signs at sharp turns
  const signGeom = new THREE.PlaneGeometry(2.5, 2.5);
  const signMat = new THREE.MeshStandardMaterial({ color: 0xffdd00, emissive: 0xffdd00, emissiveIntensity: 0.2, roughness: 0.5, metalness: 0.0, side: THREE.DoubleSide });
  for (let i = 0; i < TRACK_SAMPLES; i += 3) {
    const i2 = (i + 6) % TRACK_SAMPLES;
    const t1 = trackTangents[i];
    const t2b = trackTangents[i2];
    const angle = Math.acos(Math.max(-1, Math.min(1, t1.x * t2b.x + t1.z * t2b.z)));
    if (angle > 0.25) {
      // Determine turn direction
      const cross = t1.x * t2b.z - t1.z * t2b.x;
      const right = new THREE.Vector3().crossVectors(t1, up).normalize();
      const turnSide = cross > 0 ? -1 : 1; // sign on outside of turn
      const dist = ROAD_WIDTH / 2 + 4;
      const sign = new THREE.Mesh(signGeom, signMat);
      sign.position.set(
        trackPoints[i].x + right.x * turnSide * dist,
        trackPoints[i].y + 2,
        trackPoints[i].z + right.z * turnSide * dist
      );
      // Face the road
      sign.lookAt(trackPoints[i].x, trackPoints[i].y + 2, trackPoints[i].z);
      scene.add(sign);
      i += 15; // skip ahead to avoid too many signs
    }
  }

  trackObj = { curve: trackCurve, points: trackPoints, tangents: trackTangents };

  // Rough/sand strip alongside the road for visual boundary
  const roughVerts = [];
  const roughIdx2 = [];
  for (let i = 0; i <= TRACK_SAMPLES; i++) {
    const idx2 = i % TRACK_SAMPLES;
    const p2 = trackPoints[idx2];
    const t2 = trackTangents[idx2];
    const right2 = new THREE.Vector3().crossVectors(t2, up).normalize();
    const outerDist = ROAD_WIDTH / 2 + 5;
    const innerDist = ROAD_WIDTH / 2 + 1.2;
    // Left rough
    roughVerts.push(
      p2.x - right2.x * innerDist, p2.y + 0.005, p2.z - right2.z * innerDist,
      p2.x - right2.x * outerDist, p2.y + 0.005, p2.z - right2.z * outerDist
    );
    // Right rough
    roughVerts.push(
      p2.x + right2.x * innerDist, p2.y + 0.005, p2.z + right2.z * innerDist,
      p2.x + right2.x * outerDist, p2.y + 0.005, p2.z + right2.z * outerDist
    );
    if (i < TRACK_SAMPLES) {
      const b2 = i * 4;
      roughIdx2.push(b2, b2+4, b2+1, b2+1, b2+4, b2+5); // left
      roughIdx2.push(b2+2, b2+6, b2+3, b2+3, b2+6, b2+7); // right
    }
  }
  const roughGeom = new THREE.BufferGeometry();
  roughGeom.setAttribute('position', new THREE.Float32BufferAttribute(roughVerts, 3));
  roughGeom.setIndex(roughIdx2);
  roughGeom.computeVertexNormals();
  const roughMat = new THREE.MeshLambertMaterial({ color: isNight ? 0x1a2a18 : 0x8a7a50 });
  scene.add(new THREE.Mesh(roughGeom, roughMat));

  // Setup boost pad zones from config
  boostPadZones = config.boostPads || [];

  // Setup jump ramp zones
  jumpRampZones = config.jumpRamps || [];

  // Place boost pad visuals on track
  const up2 = new THREE.Vector3(0, 1, 0);
  boostPadZones.forEach(t => {
    const idx = Math.floor(t * TRACK_SAMPLES) % TRACK_SAMPLES;
    const p = trackPoints[idx];
    const tan = trackTangents[idx];
    const right = new THREE.Vector3().crossVectors(tan, up2).normalize();

    // Glowing strip on road
    const padGeom = new THREE.PlaneGeometry(ROAD_WIDTH * 0.8, 3);
    const padMat = new THREE.MeshStandardMaterial({
      color: 0x00ffff,
      emissive: 0x00ffff,
      emissiveIntensity: 0.8,
      transparent: true,
      opacity: 0.6,
      roughness: 0.2,
      metalness: 0.0,
      side: THREE.DoubleSide
    });
    const pad = new THREE.Mesh(padGeom, padMat);
    pad.position.set(p.x, p.y + 0.08, p.z);
    pad.rotation.x = -Math.PI / 2;
    pad.rotation.z = -Math.atan2(tan.x, tan.z);
    scene.add(pad);

    // Arrow markers on boost pad
    for (let a = -1; a <= 1; a++) {
      const arrowGeom = new THREE.ConeGeometry(0.4, 1.2, 3);
      const arrowMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.8, roughness: 0.2, metalness: 0.0 });
      const arrow = new THREE.Mesh(arrowGeom, arrowMat);
      arrow.position.set(
        p.x + right.x * a * 2.5,
        p.y + 0.15,
        p.z + right.z * a * 2.5
      );
      arrow.rotation.x = -Math.PI / 2;
      arrow.rotation.z = -Math.atan2(tan.x, tan.z);
      scene.add(arrow);
    }
  });

  // Place jump ramp visuals on track
  jumpRampZones.forEach(t => {
    const idx = Math.floor(t * TRACK_SAMPLES) % TRACK_SAMPLES;
    const p = trackPoints[idx];
    const tan = trackTangents[idx];
    const right = new THREE.Vector3().crossVectors(tan, up2).normalize();

    // Ramp geometry - wedge shape
    const rampW = ROAD_WIDTH * 0.5;
    const rampL = 3.5;
    const rampH = 1.0;
    const rampGeom = new THREE.BufferGeometry();
    // Simple wedge: 6 vertices forming a ramp
    const fwd = new THREE.Vector3(-tan.x, 0, -tan.z).normalize();
    const base1 = new THREE.Vector3(p.x - right.x * rampW/2, p.y, p.z - right.z * rampW/2);
    const base2 = new THREE.Vector3(p.x + right.x * rampW/2, p.y, p.z + right.z * rampW/2);
    const back1 = base1.clone().add(fwd.clone().multiplyScalar(rampL));
    const back2 = base2.clone().add(fwd.clone().multiplyScalar(rampL));
    const top1 = back1.clone(); top1.y += rampH;
    const top2 = back2.clone(); top2.y += rampH;

    const verts = new Float32Array([
      // Slope face
      base1.x, base1.y, base1.z, base2.x, base2.y, base2.z, top2.x, top2.y, top2.z,
      base1.x, base1.y, base1.z, top2.x, top2.y, top2.z, top1.x, top1.y, top1.z,
      // Back face
      top1.x, top1.y, top1.z, top2.x, top2.y, top2.z, back2.x, back2.y, back2.z,
      top1.x, top1.y, top1.z, back2.x, back2.y, back2.z, back1.x, back1.y, back1.z,
      // Left side
      base1.x, base1.y, base1.z, top1.x, top1.y, top1.z, back1.x, back1.y, back1.z,
      // Right side
      base2.x, base2.y, base2.z, back2.x, back2.y, back2.z, top2.x, top2.y, top2.z,
    ]);
    rampGeom.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    rampGeom.computeVertexNormals();

    const rampMat = new THREE.MeshStandardMaterial({
      color: 0xff8800,
      emissive: 0xff4400,
      emissiveIntensity: 0.3,
      roughness: 0.4,
      metalness: 0.5
    });
    const ramp = new THREE.Mesh(rampGeom, rampMat);
    ramp.castShadow = true;
    ramp.receiveShadow = true;
    scene.add(ramp);

    // Chevron stripes on ramp
    const stripeGeom = new THREE.PlaneGeometry(rampW * 0.6, 0.3);
    const stripeMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0xffcc00, emissiveIntensity: 0.3, roughness: 0.4, metalness: 0.0, side: THREE.DoubleSide });
    for (let s = 0; s < 3; s++) {
      const stripe = new THREE.Mesh(stripeGeom, stripeMat);
      const progress = (s + 1) / 4;
      const sp = base1.clone().lerp(top1, progress).add(base2.clone().lerp(top2, progress)).multiplyScalar(0.5);
      stripe.position.copy(sp);
      stripe.position.y += 0.05;
      stripe.rotation.x = -Math.PI / 2 + Math.atan2(rampH, rampL);
      stripe.rotation.z = -Math.atan2(tan.x, tan.z);
      scene.add(stripe);
    }
  });
}

// ==================== SCENERY ====================
function placeScenery(isNight) {
  // Multi-layer tree geometries
  const cone1Geom = new THREE.ConeGeometry(3.0, 4, 7);
  const cone2Geom = new THREE.ConeGeometry(2.2, 3.5, 7);
  const cone3Geom = new THREE.ConeGeometry(1.4, 3, 7);
  const trunkGeom = new THREE.CylinderGeometry(0.4, 0.7, 3, 6);

  // Irregular rock geometry
  const rockGeom = new THREE.IcosahedronGeometry(1.5, 1);
  const rockPos = rockGeom.attributes.position;
  for (let v = 0; v < rockPos.count; v++) {
    rockPos.setXYZ(v,
      rockPos.getX(v) * (0.8 + Math.random() * 0.4),
      rockPos.getY(v) * (0.8 + Math.random() * 0.4),
      rockPos.getZ(v) * (0.8 + Math.random() * 0.4)
    );
  }
  rockGeom.computeVertexNormals();

  const treeMat = new THREE.MeshLambertMaterial({ color: isNight ? 0x1a4a2a : 0x2d8a4e });
  const treeMat2 = new THREE.MeshLambertMaterial({ color: isNight ? 0x163e24 : 0x257842 });
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x5a3a1a });
  const rockMat = new THREE.MeshLambertMaterial({ color: isNight ? 0x445566 : 0x888888 });

  // Place trees around track (reduced density for performance)
  for (let i = 0; i < TRACK_SAMPLES; i += 8) {
    const p = trackPoints[i];
    const t = trackTangents[i];
    const right = new THREE.Vector3().crossVectors(t, new THREE.Vector3(0, 1, 0)).normalize();

    for (let side = -1; side <= 1; side += 2) {
      const dist = ROAD_WIDTH / 2 + 18 + Math.random() * 30;
      const x = p.x + right.x * side * dist + (Math.random() - 0.5) * 5;
      const z = p.z + right.z * side * dist + (Math.random() - 0.5) * 5;

      if (Math.random() < 0.7) {
        const tree = new THREE.Group();
        const trunk = new THREE.Mesh(trunkGeom, trunkMat);
        trunk.position.y = 1.5;
        tree.add(trunk);
        // 3-layer foliage (only bottom layer casts shadow)
        const layer1 = new THREE.Mesh(cone1Geom, treeMat);
        layer1.position.y = 4;
        layer1.castShadow = true;
        tree.add(layer1);
        const layer2 = new THREE.Mesh(cone2Geom, treeMat2);
        layer2.position.y = 6;
        tree.add(layer2);
        const layer3 = new THREE.Mesh(cone3Geom, treeMat);
        layer3.position.y = 7.8;
        tree.add(layer3);
        tree.position.set(x, p.y, z);
        tree.scale.setScalar(0.7 + Math.random() * 0.6);
        scene.add(tree);
      } else {
        const rock = new THREE.Mesh(rockGeom, rockMat);
        rock.position.set(x, p.y + 0.5, z);
        rock.rotation.set(Math.random(), Math.random(), Math.random());
        rock.scale.setScalar(0.5 + Math.random() * 1.5);
        scene.add(rock);
      }
    }
  }

  // Neon lights for night track (reduced count for performance)
  if (isNight) {
    const neonColors = [0xff00ff, 0x00ffff, 0xff6600, 0x00ff66];
    const poleGeom = new THREE.CylinderGeometry(0.12, 0.12, 2.2, 4);
    const glowGeom = new THREE.SphereGeometry(0.3, 6, 4);
    // Shared materials per color
    const neonMats = neonColors.map(c => new THREE.MeshBasicMaterial({ color: c }));
    const glowMats = neonColors.map(c => new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: 0.9 }));

    for (let i = 0; i < TRACK_SAMPLES; i += 40) {
      const p = trackPoints[i];
      const t = trackTangents[i];
      const right = new THREE.Vector3().crossVectors(t, new THREE.Vector3(0, 1, 0)).normalize();
      const colorIdx = (i / 40) % neonColors.length;

      for (let side = -1; side <= 1; side += 2) {
        const dist = ROAD_WIDTH / 2 + 3;
        const x = p.x + right.x * side * dist;
        const z = p.z + right.z * side * dist;

        // Only every other pair gets a PointLight
        if (i % 80 === 0) {
          const light = new THREE.PointLight(neonColors[colorIdx], 1.0, 40);
          light.position.set(x, p.y + 2.5, z);
          scene.add(light);
        }

        const pole = new THREE.Mesh(poleGeom, neonMats[colorIdx]);
        pole.position.set(x, p.y + 1.1, z);
        scene.add(pole);

        const glow = new THREE.Mesh(glowGeom, glowMats[colorIdx]);
        glow.position.set(x, p.y + 2.3, z);
        scene.add(glow);
      }
    }

    // Poles without lights in between (visual only, no PointLight)
    for (let i = 20; i < TRACK_SAMPLES; i += 40) {
      const p = trackPoints[i];
      const t = trackTangents[i];
      const right = new THREE.Vector3().crossVectors(t, new THREE.Vector3(0, 1, 0)).normalize();
      const colorIdx = ((i - 20) / 40) % neonColors.length;

      for (let side = -1; side <= 1; side += 2) {
        const dist = ROAD_WIDTH / 2 + 3;
        const x = p.x + right.x * side * dist;
        const z = p.z + right.z * side * dist;

        const pole = new THREE.Mesh(poleGeom, neonMats[colorIdx]);
        pole.position.set(x, p.y + 1.1, z);
        scene.add(pole);

        const glow = new THREE.Mesh(glowGeom, glowMats[colorIdx]);
        glow.position.set(x, p.y + 2.3, z);
        scene.add(glow);
      }
    }
  }
}

// ==================== ITEM BOXES ====================
function placeItemBoxes(trackIdx) {
  const interval = TRACK_CONFIGS[trackIdx].itemInterval;
  const boxGeom = new THREE.BoxGeometry(1.4, 1.4, 1.4);

  for (let i = interval; i < TRACK_SAMPLES; i += interval) {
    const p = trackPoints[i];
    const t = trackTangents[i];
    const right = new THREE.Vector3().crossVectors(t, new THREE.Vector3(0, 1, 0)).normalize();

    // Place 3 boxes across the track
    for (let j = -1; j <= 1; j++) {
      const offset = j * 5;
      const boxMat = new THREE.MeshStandardMaterial({
        color: 0xffaa00,
        emissive: 0xff6600,
        emissiveIntensity: 0.4,
        roughness: 0.3,
        metalness: 0.6,
        transparent: true,
        opacity: 0.8
      });
      const box = new THREE.Mesh(boxGeom, boxMat);
      box.position.set(
        p.x + right.x * offset,
        p.y + 1.5,
        p.z + right.z * offset
      );
      box.userData = { type: 'itemBox', respawnTimer: 0, active: true, baseY: p.y + 1.5 };
      scene.add(box);
      itemBoxes.push(box);
    }
  }
}

// ==================== KART ====================
function createKartMesh(charConfig) {
  const group = new THREE.Group();
  const color = charConfig.color;

  // Metallic car paint material
  const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.25, metalness: 0.75 });

  // Body
  const bodyGeom = new THREE.BoxGeometry(1.6, 0.45, 2.8);
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  body.position.y = 0.35;
  body.castShadow = true;
  group.add(body);

  // Rounded top panel for aerodynamic look
  const topGeom = new THREE.BoxGeometry(1.3, 0.12, 2.4);
  const topMesh = new THREE.Mesh(topGeom, bodyMat);
  topMesh.position.set(0, 0.58, -0.1);
  topMesh.castShadow = true;
  group.add(topMesh);

  // Side skirts
  const skirtMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.7, metalness: 0.2 });
  const skirtGeom = new THREE.BoxGeometry(0.08, 0.2, 2.4);
  for (let sx of [-0.8, 0.8]) {
    const skirt = new THREE.Mesh(skirtGeom, skirtMat);
    skirt.position.set(sx, 0.2, 0);
    group.add(skirt);
  }

  // Nose
  const noseGeom = new THREE.BoxGeometry(1.2, 0.3, 0.8);
  const nose = new THREE.Mesh(noseGeom, bodyMat);
  nose.position.set(0, 0.3, -1.5);
  nose.castShadow = true;
  group.add(nose);

  // Spoiler
  const spoilerGeom = new THREE.BoxGeometry(1.8, 0.08, 0.4);
  const spoiler = new THREE.Mesh(spoilerGeom, bodyMat);
  spoiler.position.set(0, 0.8, 1.2);
  group.add(spoiler);
  const spoilerStandGeom = new THREE.BoxGeometry(0.1, 0.4, 0.1);
  for (let sx of [-0.6, 0.6]) {
    const stand = new THREE.Mesh(spoilerStandGeom, bodyMat);
    stand.position.set(sx, 0.6, 1.2);
    group.add(stand);
  }

  // Cockpit
  const cockpitMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.6, metalness: 0.2 });
  const cockpitGeom = new THREE.BoxGeometry(1.2, 0.5, 1.0);
  const cockpit = new THREE.Mesh(cockpitGeom, cockpitMat);
  cockpit.position.set(0, 0.65, 0.1);
  group.add(cockpit);

  // Wheels with hubs
  const wheelGeom = new THREE.CylinderGeometry(0.32, 0.32, 0.25, 12);
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, metalness: 0.1 });
  const hubGeom = new THREE.CylinderGeometry(0.15, 0.15, 0.26, 8);
  const hubMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2, metalness: 0.8 });
  const wheelPositions = [[-0.85, 0.22, -0.9], [0.85, 0.22, -0.9], [-0.85, 0.22, 0.85], [0.85, 0.22, 0.85]];
  group.userData.wheels = [];
  wheelPositions.forEach(([x, y, z]) => {
    const wheel = new THREE.Mesh(wheelGeom, wheelMat);
    wheel.position.set(x, y, z);
    wheel.rotation.z = Math.PI / 2;
    wheel.castShadow = true;
    group.add(wheel);
    const hub = new THREE.Mesh(hubGeom, hubMat);
    hub.position.set(x, y, z);
    hub.rotation.z = Math.PI / 2;
    group.add(hub);
    group.userData.wheels.push(wheel);
  });

  // Character head
  const headGeom = new THREE.SphereGeometry(0.32, 10, 10);
  const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc99, roughness: 0.8, metalness: 0.0 });
  const head = new THREE.Mesh(headGeom, headMat);
  head.position.set(0, 1.1, 0.2);
  group.add(head);

  // Helmet
  const helmetGeom = new THREE.SphereGeometry(0.35, 10, 8, 0, Math.PI * 2, 0, Math.PI * 0.6);
  const helmetMat = new THREE.MeshStandardMaterial({ color, roughness: 0.15, metalness: 0.5 });
  const helmet = new THREE.Mesh(helmetGeom, helmetMat);
  helmet.position.set(0, 1.15, 0.2);
  group.add(helmet);

  // Visor
  const visorGeom = new THREE.BoxGeometry(0.5, 0.15, 0.05);
  const visorMat = new THREE.MeshStandardMaterial({ color: 0x222244, roughness: 0.05, metalness: 0.9 });
  const visor = new THREE.Mesh(visorGeom, visorMat);
  visor.position.set(0, 1.05, -0.15);
  group.add(visor);

  // Shield visual (initially invisible)
  const shieldGeom = new THREE.SphereGeometry(2.2, 16, 12);
  const shieldMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, transparent: true, opacity: 0, roughness: 0.1, metalness: 0.3, side: THREE.DoubleSide });
  const shieldMesh = new THREE.Mesh(shieldGeom, shieldMat);
  shieldMesh.position.y = 0.5;
  group.add(shieldMesh);
  group.userData.shieldMesh = shieldMesh;

  return group;
}

function createKart(charIdx, isPlayer) {
  const charConfig = CHARACTERS[charIdx];
  const mesh = createKartMesh(charConfig);
  scene.add(mesh);

  // Stat multipliers
  const speedMult = 0.7 + charConfig.speed * 0.08;
  const accelMult = 0.7 + charConfig.accel * 0.08;
  const handleMult = 0.7 + charConfig.handling * 0.08;
  const driftMult = 0.7 + charConfig.drift * 0.08;

  return {
    mesh,
    charIdx,
    charConfig,
    isPlayer,
    // Physics
    position: new THREE.Vector3(),
    rotation: 0,
    speed: 0,
    maxSpeed: 82 * speedMult,
    boostSpeed: 125 * speedMult,
    sacredFireSpeed: 148 * speedMult,
    acceleration: 70 * accelMult,
    braking: 95,
    turnRate: 3.0 * handleMult,
    driftTurnRate: 4.8 * driftMult,
    // CTR Drift System
    isDrifting: false,
    driftDir: 0,
    driftAngle: 0,
    hopTimer: 0,
    // CTR Boost Gauge
    driftBoostStage: 0,    // 0-3, current stage during drift
    driftBoostGauge: 0,    // 0→1 oscillating gauge
    driftBoostGaugeDir: 1, // gauge direction
    driftBoostPending: 0,  // reserve to add when drift ends
    lastBoostInput: false,
    // Boost Reserve (CTR core)
    boostReserve: 0,       // seconds of boost remaining
    sacredFire: false,     // true when reserve > threshold
    // Track
    trackProgress: 0,
    trackIndex: 0,
    lap: 0,
    lastProgress: 0,
    finished: false,
    finishTime: 0,
    // Item
    item: null,
    // Status
    shield: false,
    shieldTimer: 0,
    stunTimer: 0,
    airTimer: 0,
    airVelocity: 0,
    invincibleTimer: 0,
    // AI
    aiTargetLateral: 0,
    aiItemCooldown: 0,
    aiDriftTimer: 0,
    aiBoostTiming: 0,
    // Stats
    onRoad: true,
    passedHalf: false
  };
}

// ==================== KART PHYSICS (CTR-STYLE) ====================
const GAUGE_SPEED = 2.8;           // gauge oscillation speed
const PERFECT_MIN = 0.65;         // sweet spot range
const PERFECT_MAX = 0.88;
const GOOD_MIN = 0.40;
const GOOD_MAX = 0.95;
const STAGE_RESERVES = [0, 0.9, 1.4, 2.2]; // reserve added per stage
const SACRED_FIRE_THRESHOLD = 3.0;

function updateKartPhysics(kart, dt, input) {
  // --- STUN ---
  if (kart.stunTimer > 0) {
    kart.stunTimer -= dt;
    kart.speed *= 0.90;
    kart.boostReserve = 0;
    kart.sacredFire = false;
    kart.mesh.rotation.y += 10 * dt;
    kart.mesh.position.copy(kart.position);
    kart.mesh.position.y += Math.abs(Math.sin(kart.stunTimer * 12)) * 0.6;
    updateTrackProgress(kart);
    return;
  }

  // --- BOOST RESERVE SYSTEM (CTR core) ---
  const hasBoosting = kart.boostReserve > 0;
  kart.sacredFire = kart.boostReserve >= SACRED_FIRE_THRESHOLD;
  const currentMaxSpeed = kart.sacredFire ? kart.sacredFireSpeed
    : hasBoosting ? kart.boostSpeed : kart.maxSpeed;
  const offRoadMult = kart.onRoad ? 1.0 : 0.5;
  const effectiveMax = currentMaxSpeed * offRoadMult;

  // Reserve decays over time
  if (kart.boostReserve > 0) {
    kart.boostReserve -= dt;
    if (kart.boostReserve < 0) kart.boostReserve = 0;
    // Boost particles
    if (Math.random() < 0.6) spawnBoostParticle(kart);
  }

  // When no reserve and above normal max, drain speed
  if (!hasBoosting && kart.speed > kart.maxSpeed * offRoadMult) {
    kart.speed -= (kart.speed - kart.maxSpeed * offRoadMult) * 3.0 * dt;
  }

  // --- ACCELERATION / BRAKING ---
  if (input.accelerate) {
    const accelCurve = 1.0 - (kart.speed / effectiveMax) * 0.4;
    kart.speed += kart.acceleration * Math.max(accelCurve, 0.2) * dt;
  }
  if (input.brake) {
    if (kart.speed > 5) {
      kart.speed -= kart.braking * dt;
    } else {
      kart.speed -= kart.acceleration * 0.5 * dt;
    }
  }
  if (!input.accelerate && !input.brake) {
    kart.speed *= (1 - 1.0 * dt);
  }

  kart.speed = Math.max(-20, Math.min(effectiveMax * 1.05, kart.speed));

  // --- STEERING ---
  let steerAmount = 0;
  if (input.steer !== 0) {
    const speedFactor = Math.min(Math.abs(kart.speed) / 15, 1);
    if (kart.isDrifting) {
      steerAmount = input.steer * kart.driftTurnRate * speedFactor;
    } else {
      steerAmount = input.steer * kart.turnRate * speedFactor;
    }
  }

  // === CTR DRIFT + TIMING BOOST SYSTEM ===
  if (input.drift && Math.abs(kart.speed) > 10 && input.steer !== 0) {
    if (!kart.isDrifting) {
      // HOP into drift
      kart.isDrifting = true;
      kart.driftDir = input.steer > 0 ? 1 : -1;
      kart.driftBoostStage = 0;
      kart.driftBoostGauge = 0;
      kart.driftBoostGaugeDir = 1;
      kart.driftBoostPending = 0;
      kart.hopTimer = 0.12;
      if (kart.isPlayer) playSound(400, 0.06, 'sine', 0.25);
    }

    // Drift steering - strong inward pull like CTR
    const driftSteer = kart.driftDir * 2.0 * Math.min(Math.abs(kart.speed) / 25, 1);
    steerAmount += driftSteer;
    // Counter-steer for fine control
    if (input.steer !== kart.driftDir) {
      steerAmount += input.steer * 0.7;
    }

    // --- OSCILLATING BOOST GAUGE ---
    if (kart.driftBoostStage < 3) {
      const gaugeSpd = GAUGE_SPEED + kart.driftBoostStage * 0.6; // faster each stage
      kart.driftBoostGauge += kart.driftBoostGaugeDir * gaugeSpd * dt;
      if (kart.driftBoostGauge >= 1) {
        kart.driftBoostGauge = 1;
        kart.driftBoostGaugeDir = -1;
      } else if (kart.driftBoostGauge <= 0) {
        kart.driftBoostGauge = 0;
        kart.driftBoostGaugeDir = 1;
      }

      // --- TIMING BOOST INPUT (Shift/E pressed this frame) ---
      const boostInput = input.useItem;
      if (boostInput && !kart.lastBoostInput) {
        const g = kart.driftBoostGauge;
        if (g >= PERFECT_MIN && g <= PERFECT_MAX) {
          // PERFECT BOOST!
          kart.driftBoostStage++;
          kart.driftBoostPending += STAGE_RESERVES[kart.driftBoostStage];
          kart.driftBoostGauge = 0;
          kart.driftBoostGaugeDir = 1;
          if (kart.isPlayer) {
            playSound(800 + kart.driftBoostStage * 200, 0.12, 'sine', 0.5);
            playSound(1200 + kart.driftBoostStage * 150, 0.08, 'square', 0.3);
            shakeIntensity = 0.1 + kart.driftBoostStage * 0.08;
          }
          // Spark burst
          for (let i = 0; i < 5; i++) spawnDriftParticle(kart);
        } else if (g >= GOOD_MIN && g <= GOOD_MAX) {
          // GOOD BOOST (weaker)
          kart.driftBoostStage++;
          kart.driftBoostPending += STAGE_RESERVES[kart.driftBoostStage] * 0.5;
          kart.driftBoostGauge = 0;
          kart.driftBoostGaugeDir = 1;
          if (kart.isPlayer) {
            playSound(600 + kart.driftBoostStage * 100, 0.08, 'sine', 0.3);
          }
          for (let i = 0; i < 3; i++) spawnDriftParticle(kart);
        } else {
          // MISS! Engine sputter
          if (kart.isPlayer) {
            playSound(120, 0.15, 'sawtooth', 0.2);
            playSound(80, 0.1, 'square', 0.15);
          }
          // Reset gauge but don't lose stages
          kart.driftBoostGauge = 0;
          kart.driftBoostGaugeDir = 1;
        }
      }
      kart.lastBoostInput = boostInput;
    }

    // Drift sparks based on stage
    const sparkRate = kart.driftBoostStage >= 3 ? 0.9 : kart.driftBoostStage >= 2 ? 0.6 : kart.driftBoostStage >= 1 ? 0.35 : 0.15;
    if (Math.random() < sparkRate) spawnDriftParticle(kart);

    // Drift tire sound
    if (kart.isPlayer && Math.random() < 0.06) playDriftSound();

  } else if (kart.isDrifting) {
    // --- RELEASE DRIFT → ADD PENDING RESERVE ---
    kart.isDrifting = false;
    if (kart.driftBoostPending > 0) {
      kart.boostReserve += kart.driftBoostPending;
      kart.speed = Math.min(kart.speed + 15 + kart.driftBoostStage * 8, kart.boostSpeed);
      if (kart.isPlayer) {
        playBoostSound();
        shakeIntensity = 0.2 + kart.driftBoostStage * 0.1;
        if (kart.driftBoostStage === 3) showRaceMessage('PERFECT BOOST!');
      }
      for (let i = 0; i < 6 + kart.driftBoostStage * 3; i++) spawnBoostParticle(kart);
    }
    kart.driftBoostStage = 0;
    kart.driftBoostPending = 0;
    kart.driftBoostGauge = 0;
    kart.driftAngle = 0;
    kart.lastBoostInput = false;
  }

  // --- ROTATION ---
  kart.rotation += steerAmount * dt;

  // Drift visual angle
  const targetDriftAngle = kart.isDrifting ? kart.driftDir * 0.5 : 0;
  kart.driftAngle += (targetDriftAngle - kart.driftAngle) * 10 * dt;

  // --- MOVEMENT ---
  kart.position.x -= Math.sin(kart.rotation) * kart.speed * dt;
  kart.position.z -= Math.cos(kart.rotation) * kart.speed * dt;

  // --- TERRAIN & JUMPS ---
  const closestIdx = findClosestTrackPoint(kart.position, kart.trackIndex);
  const targetY = trackPoints[closestIdx].y;

  if (kart.hopTimer > 0) {
    kart.hopTimer -= dt;
    kart.position.y = targetY + Math.sin(kart.hopTimer / 0.12 * Math.PI) * 1.0;
  } else if (kart.airTimer > 0) {
    kart.airTimer -= dt;
    kart.position.y += kart.airVelocity * dt;
    kart.airVelocity -= 25 * dt;
    if (kart.position.y <= targetY) {
      kart.position.y = targetY;
      kart.airTimer = 0;
      // Landing boost (hang time)
      kart.boostReserve += 0.3;
      if (kart.isPlayer) { playSound(200, 0.08, 'sine', 0.2); shakeIntensity = 0.12; }
    }
  } else {
    const yDiff = targetY - kart.position.y;
    if (yDiff > 1.5 && kart.speed > 30) {
      kart.airTimer = 0.8;
      kart.airVelocity = 8 + kart.speed * 0.05;
      if (kart.isPlayer) playSound(500, 0.15, 'sine', 0.2);
    } else {
      kart.position.y += yDiff * 10 * dt;
    }
  }

  // --- ON ROAD CHECK + WALL BARRIER + RESPAWN ---
  const distToTrack = distanceToTrackCenter(kart.position, closestIdx);
  kart.onRoad = distToTrack < ROAD_WIDTH / 2 + 1;

  // Physical wall barrier - push kart back onto track
  const wallDist = ROAD_WIDTH / 2 + 2;
  if (distToTrack > wallDist) {
    const tp = trackPoints[closestIdx];
    const pushX = tp.x - kart.position.x;
    const pushZ = tp.z - kart.position.z;
    const pushLen = Math.sqrt(pushX * pushX + pushZ * pushZ);
    if (pushLen > 0.01) {
      const pushStrength = (distToTrack - wallDist) * 8 * dt;
      kart.position.x += (pushX / pushLen) * pushStrength;
      kart.position.z += (pushZ / pushLen) * pushStrength;
    }
    kart.speed *= (1 - 2.0 * dt); // wall friction
    if (kart.isPlayer && !kart._wallHitCooldown) {
      playSound(150, 0.1, 'sawtooth', 0.15);
      kart._wallHitCooldown = 0.3;
    }
  }
  if (kart._wallHitCooldown > 0) kart._wallHitCooldown -= dt;

  // Respawn if way too far off track
  if (distToTrack > ROAD_WIDTH / 2 + 25) {
    const respawnIdx = closestIdx;
    const rp = trackPoints[respawnIdx];
    const rt = trackTangents[respawnIdx];
    kart.position.set(rp.x, rp.y, rp.z);
    kart.rotation = Math.atan2(-rt.x, -rt.z);
    kart.speed = 30;
    kart.invincibleTimer = 1.0;
    kart.boostReserve = 0;
    kart.isDrifting = false;
    if (kart.isPlayer) showRaceMessage('RESPAWN!');
  }

  if (!kart.onRoad && Math.abs(kart.speed) > 10 && Math.random() < 0.3) {
    spawnDirtParticle(kart);
  }
  // Off-road kills sacred fire
  if (!kart.onRoad && kart.sacredFire) {
    kart.boostReserve = Math.min(kart.boostReserve, SACRED_FIRE_THRESHOLD * 0.5);
  }

  // --- BOOST PAD & JUMP RAMP ---
  checkBoostPad(kart);
  checkJumpRamp(kart);

  // --- SHIELD/INVINCIBLE TIMERS ---
  if (kart.shieldTimer > 0) {
    kart.shieldTimer -= dt;
    if (kart.shieldTimer <= 0) kart.shield = false;
    kart.mesh.userData.shieldMesh.material.opacity = kart.shield ? 0.3 + Math.sin(Date.now() * 0.01) * 0.15 : 0;
  } else {
    kart.mesh.userData.shieldMesh.material.opacity = 0;
  }
  if (kart.invincibleTimer > 0) {
    kart.invincibleTimer -= dt;
    kart.mesh.visible = Math.sin(Date.now() * 0.025) > 0;
  } else {
    kart.mesh.visible = true;
  }

  // --- UPDATE MESH ---
  kart.mesh.position.copy(kart.position);
  kart.mesh.rotation.y = kart.rotation + kart.driftAngle;
  const wheelSpeed = kart.speed * dt * 4;
  if (kart.mesh.userData.wheels) {
    kart.mesh.userData.wheels.forEach(w => w.rotation.x += wheelSpeed);
  }
  // Body tilt
  kart.mesh.rotation.z = -steerAmount * 0.15;
  kart.mesh.rotation.x = (input.accelerate ? -0.04 : 0) + (input.brake ? 0.06 : 0);
  // Sacred fire glow
  if (kart.sacredFire && kart.mesh.children[0]) {
    kart.mesh.children[0].material.emissive = new THREE.Color(0xff4400);
    kart.mesh.children[0].material.emissiveIntensity = 0.3 + Math.sin(Date.now() * 0.01) * 0.2;
  } else if (kart.mesh.children[0] && kart.mesh.children[0].material.emissiveIntensity > 0) {
    kart.mesh.children[0].material.emissiveIntensity = 0;
  }

  updateTrackProgress(kart);
}

// Dirt particles when off-road
// Shared particle geometries for performance
const _particleSmallGeom = new THREE.SphereGeometry(0.1, 4, 3);
const _particleMedGeom = new THREE.SphereGeometry(0.12, 4, 3);
const _particleLargeGeom = new THREE.SphereGeometry(0.18, 4, 3);

function spawnDirtParticle(kart) {
  const mat = new THREE.MeshBasicMaterial({ color: 0x886633, transparent: true });
  const p = new THREE.Mesh(_particleMedGeom, mat);
  p.position.copy(kart.position);
  p.position.y += 0.1;
  scene.add(p);
  particles.push({
    mesh: p,
    velocity: new THREE.Vector3((Math.random()-0.5)*4, Math.random()*3, (Math.random()-0.5)*4),
    lifetime: 0.3, gravity: true
  });
}

// Boost pads and jump ramps on track
let boostPadZones = [];
let jumpRampZones = [];
function checkBoostPad(kart) {
  const prog = kart.trackIndex / TRACK_SAMPLES;
  for (const zone of boostPadZones) {
    const dist = Math.abs(prog - zone);
    if (dist < 0.015 || dist > 0.985) {
      if (!kart._lastBoostPad || kart._lastBoostPad !== zone) {
        kart._lastBoostPad = zone;
        // CTR: boost pads add to reserve, maintain sacred fire
        kart.boostReserve += 1.2;
        kart.speed = Math.min(kart.speed + 20, kart.boostSpeed);
        if (kart.isPlayer) {
          playSound(700, 0.15, 'sine', 0.3);
          playSound(900, 0.1, 'sine', 0.2);
          shakeIntensity = 0.2;
        }
      }
    }
  }
  // Reset boost pad tracking when far enough away
  if (kart._lastBoostPad !== undefined) {
    const dist = Math.abs(prog - kart._lastBoostPad);
    if (dist > 0.03 && dist < 0.97) kart._lastBoostPad = undefined;
  }
}

function checkJumpRamp(kart) {
  if (kart.airTimer > 0) return; // Already in air
  const prog = kart.trackIndex / TRACK_SAMPLES;
  for (const zone of jumpRampZones) {
    const dist = Math.abs(prog - zone);
    if ((dist < 0.012 || dist > 0.988) && kart.speed > 15) {
      if (!kart._lastJumpRamp || kart._lastJumpRamp !== zone) {
        kart._lastJumpRamp = zone;
        kart.airTimer = 1.0;
        kart.airVelocity = 12 + kart.speed * 0.08;
        if (kart.isPlayer) {
          playSound(600, 0.2, 'sine', 0.3);
          playSound(800, 0.15, 'sine', 0.2);
          shakeIntensity = 0.25;
          showRaceMessage('BIG AIR!');
        }
      }
    }
  }
  // Reset jump ramp tracking
  if (kart._lastJumpRamp !== undefined) {
    const dist = Math.abs(prog - kart._lastJumpRamp);
    if (dist > 0.03 && dist < 0.97) kart._lastJumpRamp = undefined;
  }
}

function findClosestTrackPoint(pos, hintIdx) {
  let minDist = Infinity;
  let minIdx = hintIdx || 0;

  if (hintIdx !== undefined && hintIdx >= 0) {
    // Temporal continuity: search only in a window around last known position
    const searchRadius = 60;
    for (let offset = -searchRadius; offset <= searchRadius; offset++) {
      const i = ((hintIdx + offset) % TRACK_SAMPLES + TRACK_SAMPLES) % TRACK_SAMPLES;
      const dx = pos.x - trackPoints[i].x;
      const dz = pos.z - trackPoints[i].z;
      const d = dx * dx + dz * dz;
      if (d < minDist) { minDist = d; minIdx = i; }
    }
  } else {
    // Full search for initial placement
    for (let i = 0; i < TRACK_SAMPLES; i++) {
      const dx = pos.x - trackPoints[i].x;
      const dz = pos.z - trackPoints[i].z;
      const d = dx * dx + dz * dz;
      if (d < minDist) { minDist = d; minIdx = i; }
    }
  }
  return minIdx;
}

function distanceToTrackCenter(pos, idx) {
  const tp = trackPoints[idx];
  const dx = pos.x - tp.x;
  const dz = pos.z - tp.z;
  return Math.sqrt(dx * dx + dz * dz);
}

function updateTrackProgress(kart) {
  kart.trackIndex = findClosestTrackPoint(kart.position, kart.trackIndex);
  kart.lastProgress = kart.trackProgress;
  kart.trackProgress = kart.trackIndex / TRACK_SAMPLES;

  // Lap detection - require having passed at least halfway before counting
  if (kart.lastProgress > 0.9 && kart.trackProgress < 0.1 && kart.passedHalf) {
    kart.lap++;
    kart.passedHalf = false;
    if (kart.isPlayer) {
      if (kart.lap >= MAX_LAPS) {
        kart.finished = true;
        kart.finishTime = raceTime;
      } else {
        playLapSound();
        showRaceMessage(kart.lap === MAX_LAPS - 1 ? 'FINAL LAP!' : `LAP ${kart.lap + 1}`);
      }
    } else {
      if (kart.lap >= MAX_LAPS) {
        kart.finished = true;
        kart.finishTime = raceTime;
      }
    }
  }

  // Track halfway marker
  if (kart.trackProgress > 0.4 && kart.trackProgress < 0.6) {
    kart.passedHalf = true;
  }

  // Wrong way detection
  if (kart.lastProgress < 0.1 && kart.trackProgress > 0.9) {
    if (kart.lap > 0) kart.lap--;
  }
}

// ==================== AI ====================
function updateAI(kart, dt) {
  if (kart.finished) {
    kart.speed *= 0.98;
    kart.mesh.position.copy(kart.position);
    return;
  }

  const input = { accelerate: false, brake: false, steer: 0, drift: false, useItem: false };

  // Look ahead on track
  const lookAhead = 12;
  const targetIdx = (kart.trackIndex + lookAhead) % TRACK_SAMPLES;
  const target = trackPoints[targetIdx];

  // Add lateral variation
  kart.aiTargetLateral += (Math.random() - 0.5) * 0.1;
  kart.aiTargetLateral = Math.max(-3, Math.min(3, kart.aiTargetLateral));

  const right = new THREE.Vector3().crossVectors(
    trackTangents[targetIdx],
    new THREE.Vector3(0, 1, 0)
  ).normalize();

  const targetPos = new THREE.Vector3(
    target.x + right.x * kart.aiTargetLateral,
    target.y,
    target.z + right.z * kart.aiTargetLateral
  );

  // Steer toward target
  const dx = targetPos.x - kart.position.x;
  const dz = targetPos.z - kart.position.z;
  const targetAngle = Math.atan2(-dx, -dz);
  let angleDiff = targetAngle - kart.rotation;
  while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
  while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

  input.steer = Math.max(-1, Math.min(1, angleDiff * 2.5));
  input.accelerate = true;

  // Brake for sharp turns
  if (Math.abs(angleDiff) > 0.8 && kart.speed > 30) {
    input.brake = true;
    input.accelerate = false;
  }

  // AI Drift with CTR timing boost
  if (Math.abs(angleDiff) > 0.3 && kart.speed > 18 && Math.random() < 0.06) {
    kart.aiDriftTimer = 0.8 + Math.random() * 2.5;
    kart.aiBoostTiming = 0;
  }
  if (kart.aiDriftTimer > 0) {
    input.drift = true;
    kart.aiDriftTimer -= dt;

    // AI attempts timing boosts during drift
    if (kart.isDrifting && kart.driftBoostStage < 3) {
      kart.aiBoostTiming += dt;
      // AI tries to hit boost at roughly the right time
      const g = kart.driftBoostGauge;
      const position = getKartPosition(kart);
      const perfectChance = position <= 3 ? 0.65 : 0.40; // top AI is better

      if (g >= GOOD_MIN && g <= GOOD_MAX && kart.aiBoostTiming > 0.3) {
        if (g >= PERFECT_MIN && g <= PERFECT_MAX) {
          if (Math.random() < perfectChance) {
            input.useItem = true; // trigger boost
            kart.aiBoostTiming = 0;
          }
        } else if (Math.random() < 0.15) {
          input.useItem = true; // sometimes hits good zone
          kart.aiBoostTiming = 0;
        }
      }
    }
  } else {
    // AI also gets reserve from non-drift sources
    const position = getKartPosition(kart);
    if (position >= 5 && Math.random() < 0.002) {
      kart.boostReserve += 0.5; // rubber band help
    }
  }

  // Rubber banding
  const position = getKartPosition(kart);
  const baseSpeed = 82 * (0.7 + CHARACTERS[kart.charIdx].speed * 0.08);
  if (position <= 2) {
    kart.maxSpeed = baseSpeed * 0.90;
  } else if (position >= 6) {
    kart.maxSpeed = baseSpeed * 1.12;
  } else {
    kart.maxSpeed = baseSpeed;
  }

  // Use items aggressively
  if (kart.item && kart.aiItemCooldown <= 0 && !kart.isDrifting) {
    let useChance = 0.05;
    if (position >= 4) useChance = 0.1;
    if (kart.item === 'LIGHTNING' || kart.item === 'ROCKET') useChance = 0.12;
    if (Math.random() < useChance) {
      useItem(kart);
      kart.aiItemCooldown = 1.5 + Math.random() * 3;
    }
  }
  kart.aiItemCooldown -= dt;

  updateKartPhysics(kart, dt, input);
}

// ==================== ITEMS ====================
function getRandomItem(position) {
  const r = Math.random();
  if (position <= 2) {
    // Leaders get weaker items
    if (r < 0.3) return 'OIL';
    if (r < 0.6) return 'BOMB';
    if (r < 0.85) return 'TURBO';
    return 'SHIELD';
  } else if (position <= 5) {
    // Mid-pack
    if (r < 0.2) return 'ROCKET';
    if (r < 0.4) return 'TURBO';
    if (r < 0.55) return 'BOMB';
    if (r < 0.7) return 'OIL';
    if (r < 0.85) return 'SHIELD';
    return 'TRIPLE';
  } else {
    // Last place gets best items
    if (r < 0.25) return 'LIGHTNING';
    if (r < 0.5) return 'TRIPLE';
    if (r < 0.7) return 'ROCKET';
    if (r < 0.85) return 'TURBO';
    return 'SHIELD';
  }
}

function useItem(kart) {
  if (!kart.item) return;

  const itemType = kart.item;
  kart.item = null;
  if (kart.isPlayer) playItemUse();

  switch(itemType) {
    case 'ROCKET':
      fireProjectile(kart, true);
      break;
    case 'BOMB':
      fireProjectile(kart, false);
      break;
    case 'TURBO':
      kart.boostReserve += 2.0;
      kart.speed = Math.min(kart.speed + 20, kart.boostSpeed);
      if (kart.isPlayer) { playBoostSound(); shakeIntensity = 0.4; }
      break;
    case 'TRIPLE':
      kart.boostReserve += 4.0;
      kart.speed = Math.min(kart.speed + 25, kart.boostSpeed);
      if (kart.isPlayer) { playBoostSound(); shakeIntensity = 0.5; }
      break;
    case 'SHIELD':
      kart.shield = true;
      kart.shieldTimer = 8;
      break;
    case 'OIL':
      dropOilSlick(kart);
      break;
    case 'LIGHTNING':
      useLightning(kart);
      break;
  }

  updateItemDisplay();
}

function fireProjectile(kart, homing) {
  const projGeom = new THREE.SphereGeometry(0.5, 8, 6);
  const projMat = new THREE.MeshStandardMaterial({
    color: homing ? 0xff3333 : 0x33ff33,
    emissive: homing ? 0xff0000 : 0x00ff00,
    emissiveIntensity: 0.8,
    roughness: 0.2,
    metalness: 0.4
  });
  const proj = new THREE.Mesh(projGeom, projMat);
  proj.position.copy(kart.position);
  proj.position.y += 0.5;
  scene.add(proj);

  const dir = new THREE.Vector3(-Math.sin(kart.rotation), 0, -Math.cos(kart.rotation));

  activeProjectiles.push({
    mesh: proj,
    owner: kart,
    velocity: dir.multiplyScalar(homing ? 70 : 80),
    homing,
    lifetime: 5,
    target: homing ? findNearestKartAhead(kart) : null
  });
}

function findNearestKartAhead(sourceKart) {
  let nearest = null;
  let minDist = Infinity;
  karts.forEach(k => {
    if (k === sourceKart || k.finished) return;
    const prog = k.lap * 1 + k.trackProgress;
    const srcProg = sourceKart.lap * 1 + sourceKart.trackProgress;
    if (prog > srcProg) {
      const d = prog - srcProg;
      if (d < minDist) { minDist = d; nearest = k; }
    }
  });
  return nearest || karts.find(k => k !== sourceKart && !k.finished);
}

function dropOilSlick(kart) {
  const oilGeom = new THREE.CylinderGeometry(1.5, 1.5, 0.1, 8);
  const oilMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.05, metalness: 0.0, transparent: true, opacity: 0.7 });
  const oil = new THREE.Mesh(oilGeom, oilMat);

  const behind = new THREE.Vector3(Math.sin(kart.rotation), 0, Math.cos(kart.rotation));
  oil.position.copy(kart.position).add(behind.multiplyScalar(3));
  oil.position.y += 0.1;
  scene.add(oil);

  droppedItems.push({ mesh: oil, type: 'OIL', owner: kart, lifetime: 15 });
}

function useLightning(sourceKart) {
  karts.forEach(k => {
    if (k === sourceKart) return;
    if (!k.shield) {
      k.stunTimer = 1.5;
      k.speed *= 0.3;
      if (k.isPlayer) {
        playHitSound();
        shakeIntensity = 0.8;
        showHitEffect();
      }
    }
  });
  // Flash effect
  if (sourceKart.isPlayer || playerKart.stunTimer > 0) {
    document.getElementById('hit-overlay').style.opacity = '0.5';
    setTimeout(() => document.getElementById('hit-overlay').style.opacity = '0', 300);
  }
}

function updateProjectiles(dt) {
  for (let i = activeProjectiles.length - 1; i >= 0; i--) {
    const proj = activeProjectiles[i];
    proj.lifetime -= dt;

    if (proj.lifetime <= 0) {
      scene.remove(proj.mesh);
      activeProjectiles.splice(i, 1);
      continue;
    }

    // Homing behavior
    if (proj.homing && proj.target) {
      const toTarget = new THREE.Vector3().subVectors(proj.target.position, proj.mesh.position);
      toTarget.y = 0;
      toTarget.normalize();
      proj.velocity.lerp(toTarget.multiplyScalar(70), 3 * dt);
    }

    proj.mesh.position.add(proj.velocity.clone().multiplyScalar(dt));
    proj.mesh.rotation.y += 5 * dt;

    // Check collision with karts
    karts.forEach(k => {
      if (k === proj.owner || k.stunTimer > 0) return;
      if (proj.mesh.position.distanceTo(k.position) < 2.5) {
        hitKart(k, proj.owner);
        scene.remove(proj.mesh);
        activeProjectiles.splice(i, 1);
        spawnExplosion(proj.mesh.position.clone());
      }
    });
  }

  // Update dropped items
  for (let i = droppedItems.length - 1; i >= 0; i--) {
    const item = droppedItems[i];
    item.lifetime -= dt;

    if (item.lifetime <= 0) {
      scene.remove(item.mesh);
      droppedItems.splice(i, 1);
      continue;
    }

    // Check collision
    karts.forEach(k => {
      if (k === item.owner && item.lifetime > 13) return; // Brief immunity
      if (k.stunTimer > 0) return;
      if (item.mesh.position.distanceTo(k.position) < 2.5) {
        hitKart(k, item.owner);
        scene.remove(item.mesh);
        droppedItems.splice(i, 1);
      }
    });
  }
}

function hitKart(kart, attacker) {
  if (kart.shield) {
    kart.shield = false;
    kart.shieldTimer = 0;
    return;
  }
  if (kart.invincibleTimer > 0) return;

  kart.stunTimer = 1.5;
  kart.speed *= 0.2;
  kart.invincibleTimer = 2;

  if (kart.isPlayer) {
    playHitSound();
    shakeIntensity = 0.6;
    showHitEffect();
  }
}

function showHitEffect() {
  const overlay = document.getElementById('hit-overlay');
  overlay.style.opacity = '0.6';
  setTimeout(() => overlay.style.opacity = '0', 400);
}

// ==================== PARTICLES ====================
function spawnDriftParticle(kart) {
  const side = kart.driftDir || 1;
  const wheelOffset = new THREE.Vector3(side * 0.8, 0.1, 0.9);
  wheelOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), kart.rotation);

  let color;
  if (kart.driftBoostStage >= 3) color = 0xff00ff;
  else if (kart.driftBoostStage >= 2) color = 0xff2222;
  else if (kart.driftBoostStage >= 1) color = 0x4488ff;
  else color = 0xffff44;

  const sparkMat = new THREE.MeshBasicMaterial({ color, transparent: true });
  const spark = new THREE.Mesh(_particleSmallGeom, sparkMat);
  spark.position.copy(kart.position).add(wheelOffset);
  scene.add(spark);

  particles.push({
    mesh: spark,
    velocity: new THREE.Vector3((Math.random() - 0.5) * 3, Math.random() * 4, (Math.random() - 0.5) * 3),
    lifetime: 0.3 + Math.random() * 0.3,
    gravity: true
  });
}

function spawnBoostParticle(kart) {
  const behind = new THREE.Vector3(Math.sin(kart.rotation) * 1.5, 0.3, Math.cos(kart.rotation) * 1.5);

  const flameColor = Math.random() < 0.5 ? 0xff4400 : 0xffaa00;
  const flameMat = new THREE.MeshBasicMaterial({ color: flameColor, transparent: true });
  const flame = new THREE.Mesh(_particleMedGeom, flameMat);
  flame.position.copy(kart.position).add(behind);
  scene.add(flame);

  particles.push({
    mesh: flame,
    velocity: new THREE.Vector3(
      behind.x * 2 + (Math.random() - 0.5) * 2,
      Math.random() * 3,
      behind.z * 2 + (Math.random() - 0.5) * 2
    ),
    lifetime: 0.2 + Math.random() * 0.3,
    gravity: false
  });
}

function spawnExplosion(pos) {
  for (let i = 0; i < 20; i++) {
    const expColor = Math.random() < 0.5 ? 0xff4400 : 0xffcc00;
    const mat = new THREE.MeshBasicMaterial({ color: expColor, transparent: true });
    const p = new THREE.Mesh(_particleLargeGeom, mat);
    p.position.copy(pos);
    scene.add(p);

    particles.push({
      mesh: p,
      velocity: new THREE.Vector3(
        (Math.random() - 0.5) * 15,
        Math.random() * 10,
        (Math.random() - 0.5) * 15
      ),
      lifetime: 0.5 + Math.random() * 0.5,
      gravity: true
    });
  }
  playHitSound();
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.lifetime -= dt;

    if (p.lifetime <= 0) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
      continue;
    }

    p.mesh.position.add(p.velocity.clone().multiplyScalar(dt));
    if (p.gravity) p.velocity.y -= 15 * dt;
    p.mesh.material.opacity = Math.max(0, p.lifetime * 2);
    p.mesh.scale.multiplyScalar(0.97);
  }
}

// ==================== CAMERA ====================
let cameraTargetPos = new THREE.Vector3();
let cameraTargetLook = new THREE.Vector3();
let currentFov = 72;
let cameraDriftOffset = 0;

function updateCamera(dt) {
  if (!playerKart) return;

  const kart = playerKart;
  const speedRatio = Math.abs(kart.speed) / kart.maxSpeed;

  // Camera: high enough to see road ahead clearly
  const camDist = 7.0 - speedRatio * 1.2;
  const camHeight = 3.2 + (kart.airTimer > 0 ? 1.5 : 0);

  // Drift camera offset - swings out to the side during drift
  const targetDriftOffset = kart.isDrifting ? kart.driftDir * -2.0 : 0;
  cameraDriftOffset += (targetDriftOffset - cameraDriftOffset) * 4 * dt;

  const camAngle = kart.rotation + kart.driftAngle * 0.4;
  const behind = new THREE.Vector3(Math.sin(camAngle), 0, Math.cos(camAngle));
  const camRight = new THREE.Vector3(behind.z, 0, -behind.x);

  cameraTargetPos.set(
    kart.position.x + behind.x * camDist + camRight.x * cameraDriftOffset,
    kart.position.y + camHeight,
    kart.position.z + behind.z * camDist + camRight.z * cameraDriftOffset
  );

  // Look ahead further at high speed
  const lookAheadDist = 6 + speedRatio * 5;
  cameraTargetLook.set(
    kart.position.x - behind.x * lookAheadDist,
    kart.position.y + 0.8,
    kart.position.z - behind.z * lookAheadDist
  );

  // Smooth follow - faster lerp for snappier feel
  const lerpSpeed = 7;
  camera.position.lerp(cameraTargetPos, lerpSpeed * dt);
  camera.lookAt(cameraTargetLook);

  // FOV - CTR style dramatic changes
  let targetFov = 72 + speedRatio * 20;
  if (kart.boostReserve > 0) targetFov = 100;
  if (kart.sacredFire) targetFov = 108;
  if (kart.airTimer > 0) targetFov = Math.max(targetFov, 92);
  currentFov += (targetFov - currentFov) * 5 * dt;
  camera.fov = currentFov;
  camera.updateProjectionMatrix();

  // Camera shake
  if (shakeIntensity > 0) {
    camera.position.x += (Math.random() - 0.5) * shakeIntensity;
    camera.position.y += (Math.random() - 0.5) * shakeIntensity * 0.5;
    camera.position.z += (Math.random() - 0.5) * shakeIntensity * 0.3;
    shakeIntensity *= 0.88;
    if (shakeIntensity < 0.01) shakeIntensity = 0;
  }

  // High-speed micro shake for intensity
  if (speedRatio > 0.8) {
    const microShake = (speedRatio - 0.8) * 0.15;
    camera.position.x += (Math.random() - 0.5) * microShake;
    camera.position.y += (Math.random() - 0.5) * microShake * 0.5;
  }

  // Boost overlay
  const boostOverlay = document.getElementById('boost-overlay');
  boostOverlay.style.opacity = kart.boostReserve > 0 ? (kart.sacredFire ? '0.8' : '0.5') : '0';

  // Speed lines at high speed
  const speedLines = document.getElementById('speed-lines');
  speedLines.style.opacity = speedRatio > 0.6 ? ((speedRatio - 0.6) / 0.4) * 0.6 : '0';
}

// ==================== POSITION TRACKING ====================
function getKartPosition(kart) {
  let pos = 1;
  const score = kart.lap + kart.trackProgress;
  karts.forEach(k => {
    if (k === kart) return;
    const kScore = k.lap + k.trackProgress;
    if (kScore > score) pos++;
  });
  return pos;
}

function getPositionSuffix(n) {
  if (n === 1) return 'st';
  if (n === 2) return 'nd';
  if (n === 3) return 'rd';
  return 'th';
}

function updateHUD() {
  if (!playerKart || (gameState !== 'racing' && gameState !== 'finished')) return;

  const speed = Math.abs(Math.round(playerKart.speed * 1.3));

  // Race timer
  document.getElementById('race-timer').textContent = formatTime(raceTime);
  const speedEl = document.getElementById('speed-num');
  speedEl.textContent = speed;
  const speedRatio = speed / (playerKart.maxSpeed * 3.6);
  if (speedRatio > 0.85) speedEl.style.color = '#ff4444';
  else if (speedRatio > 0.6) speedEl.style.color = '#ffaa00';
  else speedEl.style.color = '#fff';

  const pos = getKartPosition(playerKart);
  const posEl = document.getElementById('position-display');
  posEl.textContent = pos + getPositionSuffix(pos);
  posEl.style.color = pos === 1 ? '#ffd93d' : pos <= 3 ? '#6bcb77' : '#fff';

  document.getElementById('lap-display').textContent = `LAP ${Math.min(playerKart.lap + 1, MAX_LAPS)}/${MAX_LAPS}`;

  // CTR Boost Gauge
  const gaugeContainer = document.getElementById('boost-gauge-container');
  const gaugeNeedle = document.getElementById('boost-gauge-needle');
  const gaugeDots = document.getElementById('boost-stage-dots');
  if (playerKart.isDrifting && playerKart.driftBoostStage < 3) {
    gaugeContainer.style.display = 'block';
    gaugeDots.style.display = 'flex';
    gaugeNeedle.style.left = (playerKart.driftBoostGauge * 196) + 'px';
    // Flash on sweet spot
    const g = playerKart.driftBoostGauge;
    if (g >= PERFECT_MIN && g <= PERFECT_MAX) {
      gaugeNeedle.style.background = '#ff4400';
      gaugeNeedle.style.boxShadow = '0 0 12px #ff4400';
    } else if (g >= GOOD_MIN && g <= GOOD_MAX) {
      gaugeNeedle.style.background = '#ffcc00';
      gaugeNeedle.style.boxShadow = '0 0 8px #ffcc00';
    } else {
      gaugeNeedle.style.background = '#fff';
      gaugeNeedle.style.boxShadow = '0 0 4px #fff';
    }
  } else {
    gaugeContainer.style.display = 'none';
    if (!playerKart.isDrifting) gaugeDots.style.display = 'none';
  }
  // Stage dots
  const dot1 = document.getElementById('dot1');
  const dot2 = document.getElementById('dot2');
  const dot3 = document.getElementById('dot3');
  dot1.className = 'boost-dot' + (playerKart.driftBoostStage >= 1 ? ' stage1' : '');
  dot2.className = 'boost-dot' + (playerKart.driftBoostStage >= 2 ? ' stage2' : '');
  dot3.className = 'boost-dot' + (playerKart.driftBoostStage >= 3 ? ' stage3' : '');

  // Reserve bar
  const reserveFill = document.getElementById('reserve-fill');
  const reservePct = Math.min(playerKart.boostReserve / 5, 1) * 100;
  reserveFill.style.height = reservePct + '%';
  if (playerKart.sacredFire) {
    reserveFill.style.background = 'linear-gradient(to top, #ff2200, #ff8800, #ffcc00)';
  } else if (playerKart.boostReserve > 0) {
    reserveFill.style.background = 'linear-gradient(to top, #ff8800, #ffcc00)';
  }

  // Sacred fire overlay
  const sfOverlay = document.getElementById('sacred-fire-overlay');
  sfOverlay.style.opacity = playerKart.sacredFire ? '0.5' : '0';

  // Wrong way
  const wrongWay = document.getElementById('wrong-way');
  if (playerKart.lastProgress < 0.1 && playerKart.trackProgress > 0.9 && playerKart.speed > 5) {
    wrongWay.style.display = 'block';
  } else {

function drawMinimap() {
  const canvas = document.getElementById('minimap');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  ctx.clearRect(0, 0, w, h);

  // Find track bounds
  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  trackPoints.forEach(p => {
    minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
    minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z);
  });

  const padding = 15;
  const scaleX = (w - padding * 2) / (maxX - minX || 1);
  const scaleZ = (h - padding * 2) / (maxZ - minZ || 1);
  const scale = Math.min(scaleX, scaleZ);
  const offX = (w - (maxX - minX) * scale) / 2;
  const offZ = (h - (maxZ - minZ) * scale) / 2;

  function mapPos(x, z) {
    return [(x - minX) * scale + offX, (z - minZ) * scale + offZ];
  }

  // Draw track outline (thick for visibility)
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 6;
  trackPoints.forEach((p, i) => {
    const [mx, mz] = mapPos(p.x, p.z);
    if (i === 0) ctx.moveTo(mx, mz);
    else ctx.lineTo(mx, mz);
  });
  ctx.closePath();
  ctx.stroke();

  // Draw track center (brighter)
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 3;
  trackPoints.forEach((p, i) => {
    const [mx, mz] = mapPos(p.x, p.z);
    if (i === 0) ctx.moveTo(mx, mz);
    else ctx.lineTo(mx, mz);
  });
  ctx.closePath();
  ctx.stroke();

  // Draw boost pads as cyan dots
  const config = TRACK_CONFIGS[selectedTrack || 0];
  if (config.boostPads) {
    ctx.fillStyle = '#00cccc';
    config.boostPads.forEach(t => {
      const idx = Math.floor(t * TRACK_SAMPLES) % TRACK_SAMPLES;
      const [mx, mz] = mapPos(trackPoints[idx].x, trackPoints[idx].z);
      ctx.beginPath();
      ctx.arc(mx, mz, 2, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  // Draw AI karts
  karts.forEach(k => {
    if (k.isPlayer) return;
    const [mx, mz] = mapPos(k.position.x, k.position.z);
    ctx.beginPath();
    ctx.fillStyle = '#' + k.charConfig.color.toString(16).padStart(6, '0');
    ctx.arc(mx, mz, 3, 0, Math.PI * 2);
    ctx.fill();
  });

  // Draw player as triangle showing direction
  if (playerKart) {
    const [mx, mz] = mapPos(playerKart.position.x, playerKart.position.z);
    const angle = playerKart.rotation;
    const size = 7;
    ctx.save();
    ctx.translate(mx, mz);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0, -size);
    ctx.lineTo(-size * 0.6, size * 0.5);
    ctx.lineTo(size * 0.6, size * 0.5);
    ctx.closePath();
    ctx.fillStyle = '#ffdd00';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  }
}

// ==================== GAME STATE ====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  document.getElementById('hud').classList.add('hidden');

  if (id === 'title-screen') {
    gameState = 'title';
  } else if (id === 'char-screen') {
    buildCharacterSelect();
  } else if (id === 'track-screen') {
    buildTrackSelect();
  }
}

function buildCharacterSelect() {
  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';

  CHARACTERS.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'char-card' + (i === selectedChar ? ' selected' : '');
    card.onclick = () => {
      selectedChar = i;
      document.querySelectorAll('.char-card').forEach(cc => cc.classList.remove('selected'));
      card.classList.add('selected');
      if (!audioCtx) initAudio();
      playSound(440 + i * 50, 0.1, 'sine', 0.2);
    };

    const stats = ['speed', 'accel', 'handling', 'drift'];
    const statLabels = ['SPD', 'ACC', 'HDL', 'DFT'];
    const statColors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff'];

    let statsHTML = '';
    stats.forEach((s, si) => {
      const val = c[s];
      statsHTML += `<div style="display:flex;align-items:center;gap:5px">
        <span style="width:28px;color:${statColors[si]}">${statLabels[si]}</span>
        <div class="stat-bar" style="flex:1"><div class="stat-fill" style="width:${val*20}%;background:${statColors[si]}"></div></div>
      </div>`;
    });

    card.innerHTML = `
      <div class="char-icon" style="background:#${c.color.toString(16).padStart(6,'0')}30;border:2px solid #${c.color.toString(16).padStart(6,'0')}">${c.icon}</div>
      <div class="char-name" style="color:#${c.color.toString(16).padStart(6,'0')}">${c.name}</div>
      <div style="font-size:0.75em;color:#888;margin-bottom:8px">${c.desc}</div>
      <div class="char-stats">${statsHTML}</div>
