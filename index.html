<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TURBO RACERS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Segoe UI',Tahoma,sans-serif;color:#fff;user-select:none}
canvas#gameCanvas{display:block;position:fixed;top:0;left:0;z-index:0}

/* Screens */
.screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity 0.5s;overflow-y:auto;overflow-x:hidden;padding:20px 0}
.hidden{display:none!important}

/* Title */
#title-screen{background:linear-gradient(135deg,#0a0a2e 0%,#1a1a4e 50%,#0a0a2e 100%)}
#title-screen h1{font-size:5em;font-weight:900;background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#ff6b6b);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:titleShine 3s linear infinite;text-shadow:none;letter-spacing:0.05em;margin-bottom:10px}
@keyframes titleShine{0%{background-position:0%}100%{background-position:200%}}
#title-screen .subtitle{font-size:1.2em;color:#aaa;margin-bottom:50px;letter-spacing:0.3em}
.menu-btn{padding:18px 60px;font-size:1.3em;font-weight:700;border:none;border-radius:12px;cursor:pointer;margin:8px;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.1em}
.menu-btn.primary{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;box-shadow:0 4px 20px rgba(255,107,107,0.4)}
.menu-btn.primary:hover{transform:scale(1.05);box-shadow:0 6px 30px rgba(255,107,107,0.6)}
.menu-btn.secondary{background:rgba(255,255,255,0.1);color:#fff;border:2px solid rgba(255,255,255,0.3)}
.menu-btn.secondary:hover{background:rgba(255,255,255,0.2)}

/* Character Select */
#char-screen{background:linear-gradient(135deg,#0a0a2e 0%,#1a1a4e 100%);overflow-y:auto;padding:20px 0}
#char-screen h2{font-size:2.5em;margin-bottom:20px;font-weight:800;flex-shrink:0}
.char-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:800px;padding:0 20px;flex-shrink:0}
.char-card{background:rgba(255,255,255,0.05);border:3px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px 15px;text-align:center;cursor:pointer;transition:all 0.2s}
.char-card:hover{border-color:rgba(255,255,255,0.4);transform:translateY(-5px);background:rgba(255,255,255,0.1)}
.char-card.selected{border-color:#ffd93d;box-shadow:0 0 25px rgba(255,217,61,0.3);background:rgba(255,217,61,0.1)}
.char-icon{width:60px;height:60px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:2em}
.char-name{font-weight:700;font-size:1.1em;margin-bottom:8px}
.char-stats{font-size:0.75em;color:#aaa;text-align:left;padding:0 5px}
.stat-bar{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;margin:3px 0 6px;overflow:hidden}
.stat-fill{height:100%;border-radius:3px;transition:width 0.3s}

/* Track Select */
#track-screen{background:linear-gradient(135deg,#0a0a2e 0%,#1a1a4e 100%)}
#track-screen h2{font-size:2.5em;margin-bottom:30px;font-weight:800}
.track-grid{display:flex;gap:25px;padding:0 20px}
.track-card{background:rgba(255,255,255,0.05);border:3px solid rgba(255,255,255,0.1);border-radius:16px;padding:25px;text-align:center;cursor:pointer;transition:all 0.2s;width:280px}
.track-card:hover{border-color:rgba(255,255,255,0.4);transform:translateY(-5px)}
.track-card.selected{border-color:#4d96ff;box-shadow:0 0 25px rgba(77,150,255,0.3);background:rgba(77,150,255,0.1)}
.track-preview{width:220px;height:150px;border-radius:10px;margin:0 auto 15px;overflow:hidden;background:#111}
.track-preview canvas{width:100%;height:100%}
.track-name{font-weight:700;font-size:1.3em;margin-bottom:5px}
.track-desc{font-size:0.85em;color:#aaa}

/* HUD */
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
#speed-display{position:absolute;bottom:30px;right:30px;text-align:right;background:linear-gradient(135deg,rgba(0,0,0,0.5),rgba(0,0,0,0.2));padding:8px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.1)}
#speed-num{font-size:3.5em;font-weight:900;line-height:1}
#speed-unit{font-size:1em;color:#aaa}
#position-display{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:2em;font-weight:900;text-shadow:0 2px 10px rgba(0,0,0,0.8)}
#lap-display{position:absolute;top:20px;right:30px;font-size:1.3em;font-weight:700}
#item-display{position:absolute;top:80px;left:50%;transform:translateX(-50%);width:80px;height:80px;border-radius:14px;background:rgba(0,0,0,0.7);border:3px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:2.8em;transition:all 0.15s}
#item-name{position:absolute;top:165px;left:50%;transform:translateX(-50%);color:#ffdd00;font-size:1em;font-weight:700;text-shadow:0 0 8px rgba(0,0,0,0.9);opacity:0;transition:opacity 0.3s;white-space:nowrap}
#minimap-container{position:absolute;bottom:30px;left:30px}
#minimap{background:rgba(0,0,0,0.5);border-radius:10px;border:2px solid rgba(255,255,255,0.2)}
#drift-meter{position:absolute;bottom:120px;right:30px;width:8px;height:150px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;display:none}
#drift-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,#ff6b6b,#ffd93d,#6bcb77);border-radius:4px;transition:height 0.1s}
/* CTR Boost Gauge */
#boost-gauge-container{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);width:200px;height:20px;background:rgba(0,0,0,0.6);border-radius:10px;border:2px solid rgba(255,255,255,0.3);overflow:hidden;display:none}
#boost-gauge-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg,rgba(100,100,100,0.3) 0%,rgba(100,100,100,0.3) 40%,rgba(255,200,0,0.4) 40%,rgba(255,200,0,0.4) 70%,rgba(255,50,0,0.5) 70%,rgba(255,50,0,0.5) 90%,rgba(255,200,0,0.4) 90%,rgba(255,200,0,0.4) 100%)}
#boost-gauge-needle{position:absolute;top:0;left:0;width:4px;height:100%;background:#fff;border-radius:2px;box-shadow:0 0 8px #fff;transition:left 0.03s linear}
#boost-gauge-flash{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0);border-radius:8px;transition:background 0.1s}
#boost-stage-dots{position:absolute;bottom:112px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.boost-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:rgba(0,0,0,0.4)}
.boost-dot.stage1{background:#4488ff;border-color:#66aaff;box-shadow:0 0 8px #4488ff}
.boost-dot.stage2{background:#ff4400;border-color:#ff6644;box-shadow:0 0 8px #ff4400}
.boost-dot.stage3{background:#222;border-color:#666;box-shadow:0 0 12px #ff00ff,0 0 4px #000}
/* Reserve Bar */
#reserve-bar{position:absolute;bottom:22px;right:30px;width:8px;height:60px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden}
#reserve-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,#ff8800,#ffcc00);border-radius:4px}
#sacred-fire-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4;opacity:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(255,120,0,0.35) 100%)}
#wrong-way{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3em;font-weight:900;color:#ff4444;text-shadow:0 0 20px rgba(255,0,0,0.5);display:none}

/* Countdown */
#countdown{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:8em;font-weight:900;z-index:15;text-shadow:0 0 40px rgba(0,0,0,0.8);transition:all 0.3s}
@keyframes countPulse{0%{transform:translate(-50%,-50%) scale(1.5);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0.8}}

/* Race Message */
#race-msg{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);font-size:3em;font-weight:900;z-index:15;text-shadow:0 0 30px rgba(0,0,0,0.8);opacity:0;transition:opacity 0.5s}

/* Results */
#results-screen{background:rgba(0,0,0,0.85);backdrop-filter:blur(10px)}
#results-screen h2{font-size:2.5em;margin-bottom:30px}
.results-table{width:500px;border-collapse:collapse}
.results-table tr{border-bottom:1px solid rgba(255,255,255,0.1)}
.results-table td{padding:12px 15px;font-size:1.1em}
.results-table tr:first-child td{color:#ffd93d;font-weight:700;font-size:1.3em}
.results-table .pos{font-weight:900;width:40px}
.results-table .time{text-align:right;color:#aaa;font-family:monospace}
.player-row{background:rgba(255,217,61,0.1)}

/* Controls hint */
.controls-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-size:0.85em;color:#666;text-align:center;line-height:1.8}
.controls-hint kbd{background:rgba(255,255,255,0.1);padding:2px 8px;border-radius:4px;border:1px solid rgba(255,255,255,0.2);font-family:inherit}

/* Boost effect overlay */
/* Touch Controls */
#touch-controls{position:fixed;bottom:0;left:0;width:100%;height:auto;z-index:6;display:flex;justify-content:space-between;padding:10px 15px 15px;pointer-events:none}
#touch-left,#touch-right{display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:auto}
#touch-right{flex-direction:row;gap:14px;align-items:flex-end}
.touch-btn{width:66px;height:66px;border-radius:16px;border:2.5px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.18);color:#fff;font-size:1.3em;font-weight:700;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}
.touch-btn:active,.touch-btn.active{background:rgba(255,255,255,0.4);border-color:rgba(255,255,255,0.8);transform:scale(0.93)}
.touch-action{width:88px;height:88px;border-radius:50%;font-size:0.9em;background:rgba(100,150,255,0.35);border-color:rgba(100,150,255,0.6)}
.touch-up{width:80px;height:60px;border-radius:16px;background:rgba(80,220,80,0.3);border-color:rgba(80,220,80,0.5);font-size:1em}
@media(max-height:450px){.touch-btn{width:56px;height:56px}.touch-action{width:74px;height:74px}.touch-up{width:68px;height:50px}}
@media(max-width:900px){#speed-display{bottom:130px!important}#minimap-container{bottom:130px!important}#minimap{width:140px!important;height:140px!important}
.char-grid{grid-template-columns:repeat(2,1fr)!important;gap:8px!important;max-width:400px!important}
.char-card{padding:12px 8px!important}
.char-icon{width:40px!important;height:40px!important;font-size:1.4em!important}
.char-name{font-size:0.9em!important}
.char-stats{font-size:0.65em!important}
.track-grid{flex-direction:column!important;align-items:center!important;gap:12px!important}
.track-card{width:240px!important;padding:15px!important}
.track-preview{width:180px!important;height:100px!important}
.track-name{font-size:1em!important}
#char-screen h2,#track-screen h2{font-size:1.6em!important;margin-bottom:10px!important}
.menu-btn{padding:12px 40px!important;font-size:1em!important}
#title-screen h1{font-size:2.8em!important}
#title-screen .subtitle{font-size:0.9em!important;margin-bottom:25px!important}
.controls-hint{display:none!important}
.results-table{width:90%!important;font-size:0.9em!important}
}
@media(max-width:600px){#speed-display{bottom:120px!important;right:15px!important}#minimap-container{bottom:120px!important;left:10px!important}#position-display{font-size:1.5em!important}#lap-display{font-size:1em!important}#item-display{width:60px!important;height:60px!important;font-size:2em!important;top:60px!important}}
@media(max-height:400px){
.screen{padding:10px 0!important;justify-content:flex-start!important}
#char-screen h2,#track-screen h2{font-size:1.3em!important;margin-bottom:5px!important}
.char-grid{grid-template-columns:repeat(4,1fr)!important;gap:6px!important;max-width:95%!important}
.char-card{padding:8px 5px!important}
.char-icon{width:30px!important;height:30px!important;font-size:1.1em!important;margin-bottom:4px!important}
.char-name{font-size:0.75em!important;margin-bottom:3px!important}
.char-stats{display:none!important}
.track-grid{flex-direction:row!important;gap:10px!important}
.track-card{width:160px!important;padding:10px!important}
.track-preview{width:130px!important;height:70px!important;margin-bottom:8px!important}
.track-name{font-size:0.85em!important}
.track-desc{font-size:0.7em!important}
.menu-btn{padding:10px 30px!important;font-size:0.9em!important}
#title-screen h1{font-size:2.2em!important}
#title-screen .subtitle{margin-bottom:15px!important}
}

/* Portrait orientation warning */
#rotate-msg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;background:rgba(10,10,30,0.95);color:#fff;flex-direction:column;align-items:center;justify-content:center;font-size:1.4em;font-weight:700;gap:15px}
#rotate-msg .rotate-icon{font-size:3em;animation:rotatePhone 1.5s ease-in-out infinite}
@keyframes rotatePhone{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}
@media(orientation:portrait) and (max-width:900px){#rotate-msg{display:flex}}

#boost-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4;opacity:0;transition:opacity 0.2s;background:radial-gradient(ellipse at center,transparent 50%,rgba(255,100,0,0.4) 100%)}
#speed-lines{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;opacity:0;transition:opacity 0.3s;background:repeating-conic-gradient(transparent 0deg,transparent 8deg,rgba(255,255,255,0.03) 9deg,transparent 10deg);animation:spinLines 0.5s linear infinite}
@keyframes spinLines{from{transform:rotate(0deg)}to{transform:rotate(10deg)}}
#hit-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4;opacity:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(255,0,0,0.4) 100%)}
</style>
</head>
<body>

<!-- Portrait Rotation Warning -->
<div id="rotate-msg">
  <div class="rotate-icon">📱</div>
  <div>横向きにしてプレイしてください</div>
  <div style="font-size:0.7em;color:#aaa">Please rotate your device</div>
</div>

<!-- Title Screen -->
<div id="title-screen" class="screen">
  <h1>TURBO RACERS</h1>
  <p class="subtitle">3D KART RACING</p>
  <button class="menu-btn primary" onclick="showScreen('char-screen')">START RACE</button>
  <div class="controls-hint" style="margin-top:40px">
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> / Arrows : Move&emsp;
    <kbd>Space</kbd>+Steer : Drift&emsp;
    <kbd>Shift</kbd> : Boost(drift) / Item
  </div>
</div>

<!-- Character Select -->
<div id="char-screen" class="screen hidden">
  <h2>RACER SELECT</h2>
  <div class="char-grid" id="char-grid"></div>
  <div style="margin-top:30px">
    <button class="menu-btn secondary" onclick="showScreen('title-screen')">BACK</button>
    <button class="menu-btn primary" onclick="showScreen('track-screen')">NEXT</button>
  </div>
</div>

<!-- Track Select -->
<div id="track-screen" class="screen hidden">
  <h2>SELECT TRACK</h2>
  <div class="track-grid" id="track-grid"></div>
  <div style="margin-top:30px">
    <button class="menu-btn secondary" onclick="showScreen('char-screen')">BACK</button>
    <button class="menu-btn primary" onclick="startRace()">RACE!</button>
  </div>
</div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div id="speed-display"><div id="speed-num">0</div><div id="speed-unit">km/h</div></div>
  <div id="position-display">1st</div>
  <div id="lap-display">LAP 1/3</div>
  <div id="race-timer" style="position:absolute;top:50px;right:30px;font-size:1em;font-family:monospace;color:rgba(255,255,255,0.7)">0:00.000</div>
  <div id="item-display"></div>
  <div id="item-name"></div>
  <div id="minimap-container"><canvas id="minimap" width="200" height="200"></canvas></div>
  <div id="drift-meter"><div id="drift-fill" style="height:0%"></div></div>
  <div id="boost-gauge-container"><div id="boost-gauge-bg"></div><div id="boost-gauge-needle"></div><div id="boost-gauge-flash"></div></div>
  <div id="boost-stage-dots"><div class="boost-dot" id="dot1"></div><div class="boost-dot" id="dot2"></div><div class="boost-dot" id="dot3"></div></div>
  <div id="reserve-bar"><div id="reserve-fill" style="height:0%"></div></div>
  <div id="wrong-way">WRONG WAY!</div>
</div>

<!-- Countdown -->
<div id="countdown" class="hidden"></div>

<!-- Race Message -->
<div id="race-msg" class="hidden"></div>

<!-- Results -->
<div id="results-screen" class="screen hidden">
  <h2>RESULTS</h2>
  <table class="results-table" id="results-table"></table>
  <div style="margin-top:30px">
    <button class="menu-btn secondary" onclick="showScreen('char-screen')">RETRY</button>
    <button class="menu-btn primary" onclick="showScreen('title-screen')">TITLE</button>
  </div>
</div>

<!-- Mobile Touch Controls -->
<div id="touch-controls" class="hidden">
  <div id="touch-left">
    <button class="touch-btn touch-up" id="t-up">GAS</button>
    <div style="display:flex;gap:6px">
      <button class="touch-btn touch-lr" id="t-left">&#x25C0;</button>
      <button class="touch-btn touch-lr" id="t-right">&#x25B6;</button>
    </div>
    <button class="touch-btn touch-down" id="t-down">&#x25BC;</button>
  </div>
  <div id="touch-right">
    <button class="touch-btn touch-action" id="t-drift">DRIFT</button>
    <button class="touch-btn touch-action" id="t-item" style="background:rgba(255,150,0,0.4);border-color:rgba(255,150,0,0.6)">ITEM</button>
  </div>
</div>

<!-- Overlays -->
<div id="boost-overlay"></div>
<div id="speed-lines"></div>
<div id="hit-overlay"></div>
<div id="sacred-fire-overlay"></div>

<canvas id="gameCanvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/FXAAShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script>
// ============================================================
// TURBO RACERS - 3D Kart Racing Game
// ============================================================

// ==================== CONFIGURATION ====================
const CHARACTERS = [
  { name:'BLAZE', color:0xff4444, icon:'&#x1F525;', speed:3, accel:3, handling:3, drift:3, desc:'Balanced' },
  { name:'BOLT', color:0x4488ff, icon:'&#x26A1;', speed:5, accel:2, handling:2, drift:3, desc:'Speed' },
  { name:'LEAF', color:0x44cc66, icon:'&#x1F343;', speed:2, accel:3, handling:5, drift:3, desc:'Handling' },
  { name:'SPARK', color:0xffcc00, icon:'&#x2B50;', speed:3, accel:3, handling:2, drift:5, desc:'Drift' },
  { name:'SHADOW', color:0x9944ff, icon:'&#x1F30C;', speed:4, accel:2, handling:3, drift:4, desc:'Power' },
  { name:'FLAME', color:0xff8800, icon:'&#x1F308;', speed:2, accel:5, handling:3, drift:3, desc:'Accel' },
  { name:'ROSE', color:0xff66aa, icon:'&#x1F338;', speed:3, accel:4, handling:4, drift:2, desc:'All-Round' },
  { name:'VOID', color:0x222222, icon:'&#x1F480;', speed:5, accel:1, handling:2, drift:5, desc:'Expert' }
];

const TRACK_CONFIGS = [
  {
    name:'Sunset Bay',
    desc:'Beachside oval with a mountain pass!',
    color:'#4d96ff',
    laps:3,
    itemInterval:20,
    boostPads:[0.08, 0.20, 0.35, 0.48, 0.60, 0.72, 0.85, 0.95],
    jumpRamps:[0.25, 0.62, 0.80],
    points:[
      // === MAIN STRAIGHT (south, -Z) ===
      [0,0,0],[0,0,-50],[0,0,-100],[0,0,-150],
      // === TURN 1: sweeping right ===
      [30,0,-185],[70,0,-210],[120,0,-222],
      // === BOTTOM STRAIGHT (east) ===
      [170,0,-218],[210,0,-205],
      // === TURN 2: right heading north ===
      [240,0,-180],[258,3,-148],[265,6,-110],
      // === EAST SIDE: mountain climb ===
      [262,10,-70],[255,14,-30],[240,17,5],
      // === TURN 3: hairpin at peak ===

// ==================== AUDIO ====================
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
}

function playSound(freq, duration, type='square', vol=0.3) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playEngineSound(speed, maxSpeed) {
  if (!audioCtx || gameState !== 'racing') return;
  const freq = 60 + (speed / maxSpeed) * 120;
  playSound(freq, 0.08, 'sawtooth', 0.05);
}

function playCountdownBeep(final) {
  playSound(final ? 880 : 440, final ? 0.5 : 0.2, 'sine', 0.5);
}

function playDriftSound() { playSound(180, 0.12, 'sawtooth', 0.1); playSound(240, 0.08, 'square', 0.05); }
function playBoostSound() { playSound(500, 0.15, 'sine', 0.5); playSound(700, 0.2, 'sine', 0.4); playSound(1000, 0.1, 'square', 0.2); }
function playItemPickup() { playSound(523, 0.1, 'sine', 0.3); playSound(659, 0.1, 'sine', 0.3); }
function playItemUse() { playSound(330, 0.15, 'square', 0.3); }
function playHitSound() { playSound(100, 0.3, 'sawtooth', 0.5); playSound(80, 0.4, 'square', 0.3); }
function playLapSound() { playSound(523, 0.15, 'sine', 0.4); setTimeout(()=>playSound(659, 0.15, 'sine', 0.4), 150); setTimeout(()=>playSound(784, 0.3, 'sine', 0.4), 300); }

function initThree() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 15, 20);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.outputEncoding = THREE.sRGBEncoding;

  // Post-processing
  composer = new THREE.EffectComposer(renderer);
  const renderPass = new THREE.RenderPass(scene, camera);
  composer.addPass(renderPass);

  bloomPass = new THREE.UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.3, 0.4, 0.85
  );
  composer.addPass(bloomPass);

  fxaaPass = new THREE.ShaderPass(THREE.FXAAShader);
  fxaaPass.uniforms['resolution'].value.set(1 / window.innerWidth, 1 / window.innerHeight);
  composer.addPass(fxaaPass);

  clock = new THREE.Clock();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
    fxaaPass.uniforms['resolution'].value.set(1 / window.innerWidth, 1 / window.innerHeight);
  });
}

function createGrassTexture(isNight) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext('2d');
  const baseR = isNight ? 14 : 50, baseG = isNight ? 32 : 140, baseB = isNight ? 14 : 55;
  ctx.fillStyle = `rgb(${baseR},${baseG},${baseB})`;
  ctx.fillRect(0, 0, 512, 512);
  for (let i = 0; i < 8000; i++) {
    const x = Math.random() * 512, y = Math.random() * 512;
    const v = Math.floor(Math.random() * 40 - 20);
    ctx.fillStyle = `rgb(${Math.max(0,baseR+v)},${Math.max(0,baseG+v+Math.floor(Math.random()*15))},${Math.max(0,baseB+v)})`;
    ctx.fillRect(x, y, 2 + Math.random() * 4, 1 + Math.random() * 3);
  }
  for (let i = 0; i < 300; i++) {
    const x = Math.random() * 512, y = Math.random() * 512;
    ctx.fillStyle = isNight ? 'rgba(20,15,10,0.4)' : 'rgba(140,120,70,0.3)';
    ctx.beginPath();
    ctx.ellipse(x, y, 3 + Math.random() * 8, 2 + Math.random() * 5, Math.random() * Math.PI, 0, Math.PI * 2);
    ctx.fill();
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(50, 50);
  tex.encoding = THREE.sRGBEncoding;
  return tex;
}

function createSkyDome(isNight) {
  const skyGeom = new THREE.SphereGeometry(450, 32, 15);
  const skyUniforms = {
    topColor: { value: new THREE.Color(isNight ? 0x000010 : 0x1a3a6a) },
    bottomColor: { value: new THREE.Color(isNight ? 0x0a0a2e : 0x87ceeb) },
    offset: { value: 20 },
    exponent: { value: 0.6 }
  };
  const skyMat = new THREE.ShaderMaterial({
    uniforms: skyUniforms,
    vertexShader: `varying vec3 vWorldPosition;
      void main() {
        vec4 worldPos = modelMatrix * vec4(position, 1.0);
        vWorldPosition = worldPos.xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `uniform vec3 topColor; uniform vec3 bottomColor;
      uniform float offset; uniform float exponent;
      varying vec3 vWorldPosition;
      void main() {
        float h = normalize(vWorldPosition + offset).y;
        gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
      }`,
    side: THREE.BackSide,
    depthWrite: false
  });
  const sky = new THREE.Mesh(skyGeom, skyMat);
  scene.add(sky);

  if (isNight) {
    const starVerts = [];
    for (let i = 0; i < 500; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(Math.random() * 0.8 + 0.2);
      const r = 440;
      starVerts.push(r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
    }
    const starGeom = new THREE.BufferGeometry();
    starGeom.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, sizeAttenuation: true });
    scene.add(new THREE.Points(starGeom, starMat));
  } else {
    // Sun sprite
    const sunCanvas = document.createElement('canvas');
    sunCanvas.width = 128; sunCanvas.height = 128;
    const sctx = sunCanvas.getContext('2d');
    const grad = sctx.createRadialGradient(64, 64, 0, 64, 64, 64);
    grad.addColorStop(0, 'rgba(255,255,220,1)');
    grad.addColorStop(0.2, 'rgba(255,240,180,0.9)');
    grad.addColorStop(0.5, 'rgba(255,200,100,0.3)');
    grad.addColorStop(1, 'rgba(255,200,100,0)');
    sctx.fillStyle = grad;
    sctx.fillRect(0, 0, 128, 128);
    const sunTex = new THREE.CanvasTexture(sunCanvas);
    const sunSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: sunTex, transparent: true, blending: THREE.AdditiveBlending }));
    sunSprite.position.set(50, 80, 30).normalize().multiplyScalar(400);
    sunSprite.scale.set(60, 60, 1);
    scene.add(sunSprite);
  }
}

function createClouds(isNight) {
